name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths: ["native/android-app/**", ".github/workflows/android-apk.yml"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > native/android-app/release.keystore
            echo "Using the release keystore from secrets (same key as the TWA, so this installs as an update)."
          else
            echo "No keystore secret — generating a throwaway key (dev-style build)."
            keytool -genkeypair -v -keystore native/android-app/release.keystore -alias hybrid \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass hybridengine -keypass hybridengine \
              -dname "CN=THE Hybrid Engine, OU=Personal, O=Hybrid, L=NA, ST=NA, C=AU"
          fi
      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/native/android-app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'hybridengine' }}
          KEY_ALIAS: hybrid
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'hybridengine' }}
        run: gradle -p native/android-app assembleRelease --no-daemon
      - name: Collect APK
        run: |
          apk=$(ls native/android-app/app/build/outputs/apk/release/*.apk | head -1)
          if [ -z "$apk" ]; then echo "No APK produced."; exit 1; fi
          cp "$apk" HybridEngine-Android.apk
          ls -la HybridEngine-Android.apk
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-engine-android
          path: HybridEngine-Android.apk
      - name: Publish to Release (clean public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: THE Hybrid Engine — Android
          body: "Android app for THE Hybrid Engine (native shell v2 — live WHOOP heart rate over Bluetooth built in). Installing over the previous version keeps your workouts. Copy to your phone and tap to install (allow install from unknown sources). Rebuilt automatically."
          files: HybridEngine-Android.apk
