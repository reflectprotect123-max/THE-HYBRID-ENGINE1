name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths: ["native/android/**", ".github/workflows/android-apk.yml"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore signing keystore
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > hybrid-release.keystore
      - name: Build APK (and AAB)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Let Bubblewrap fully self-manage its JDK+SDK. The ubuntu runner
          # preseeds ANDROID_SDK_ROOT/ANDROID_HOME to a different SDK, and
          # gradle refuses when two conflicting SDK paths are injected.
          unset ANDROID_HOME ANDROID_SDK_ROOT
          if [ ! -f hybrid-release.keystore ]; then
            echo "No release keystore secret set — generating a throwaway key for an unsigned-style build."
            keytool -genkeypair -v -keystore hybrid-release.keystore -alias hybrid \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass hybridengine -keypass hybridengine \
              -dname "CN=THE Hybrid Engine, OU=Personal, O=Hybrid, L=NA, ST=NA, C=AU"
            export BUBBLEWRAP_KEYSTORE_PASSWORD=hybridengine
            export BUBBLEWRAP_KEY_PASSWORD=hybridengine
          fi
          yes | bubblewrap build --skipPwaValidation
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-engine-android
          path: |
            native/android/app-release-signed.apk
            native/android/app-release-bundle.aab
          if-no-files-found: warn
      - name: Prepare release asset
        run: cp app-release-signed.apk "$GITHUB_WORKSPACE/HybridEngine-Android.apk"
      - name: Publish to Release (clean public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: THE Hybrid Engine — Android
          body: "Android APK for THE Hybrid Engine. Copy to your phone and tap to install (allow install from unknown sources). Rebuilt automatically."
          files: HybridEngine-Android.apk
