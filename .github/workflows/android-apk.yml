name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths: ["native/android/**", ".github/workflows/android-apk.yml"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: native/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore signing keystore
        if: ${{ env.KEYSTORE_B64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > hybrid-release.keystore
      - name: Build APK (and AAB)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Point Bubblewrap at the runner's PREINSTALLED Android SDK + the
          # setup-java JDK. This avoids Bubblewrap downloading its own SDK on a
          # cold runner — that download floods gradle's stderr and overflows
          # Node's maxBuffer ("cli ERROR stderr maxBuffer length exceeded"),
          # crashing the build before any APK is produced. Using one existing
          # SDK also removes the dual-path conflict from before.
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          mkdir -p ~/.bubblewrap ~/.gradle
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_SDK_ROOT" > ~/.bubblewrap/config.json
          printf 'org.gradle.console=plain\norg.gradle.logging.level=quiet\norg.gradle.daemon=false\n' > ~/.gradle/gradle.properties
          echo "Bubblewrap SDK config:"; cat ~/.bubblewrap/config.json
          if [ ! -f hybrid-release.keystore ]; then
            echo "No release keystore secret set — generating a throwaway key for an unsigned-style build."
            keytool -genkeypair -v -keystore hybrid-release.keystore -alias hybrid \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass hybridengine -keypass hybridengine \
              -dname "CN=THE Hybrid Engine, OU=Personal, O=Hybrid, L=NA, ST=NA, C=AU"
            export BUBBLEWRAP_KEYSTORE_PASSWORD=hybridengine
            export BUBBLEWRAP_KEY_PASSWORD=hybridengine
          fi
          yes | bubblewrap build --skipPwaValidation
          echo "APK files produced:"; ls -la *.apk *.aab 2>/dev/null || echo "(none at top level)"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-engine-android
          path: |
            native/android/*.apk
            native/android/*.aab
          if-no-files-found: warn
      - name: Prepare release asset
        run: |
          apk=$(ls app-release-signed.apk app-release-unsigned.apk *.apk 2>/dev/null | head -1)
          if [ -z "$apk" ]; then echo "No APK was produced — failing so the flake is visible."; exit 1; fi
          echo "Publishing APK: $apk"
          cp "$apk" "$GITHUB_WORKSPACE/HybridEngine-Android.apk"
      - name: Publish to Release (clean public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: THE Hybrid Engine — Android
          body: "Android APK for THE Hybrid Engine. Copy to your phone and tap to install (allow install from unknown sources). Rebuilt automatically."
          files: HybridEngine-Android.apk
