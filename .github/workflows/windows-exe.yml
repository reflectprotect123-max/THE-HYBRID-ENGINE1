name: Build Windows .exe

on:
  workflow_dispatch:
  push:
    paths: ["native/windows/**", ".github/workflows/windows-exe.yml"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native/windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/windows/src-tauri
      - name: Install deps
        run: npm install
      - name: Generate icons
        run: npx tauri icon src-tauri/icons/icon-source.png
      - name: Build .exe + installers
        run: npm run build
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-engine-windows
          path: |
            native/windows/src-tauri/target/release/bundle/nsis/*.exe
            native/windows/src-tauri/target/release/bundle/msi/*.msi
            native/windows/src-tauri/target/release/*.exe
          if-no-files-found: warn
      - name: Prepare release asset
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE/HybridEngine-Windows-Setup.exe"
      - name: Publish to Release (clean public download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-latest
          name: THE Hybrid Engine — Windows
          body: "Windows installer for THE Hybrid Engine. Run it, then click More info → Run anyway past SmartScreen (unsigned). Rebuilt automatically."
          files: HybridEngine-Windows-Setup.exe
