function removeExtra(){let t=current();if(!t?.rows?.length)return;let last=t.rows.length-1;if(!t.rows[last].extra)return;deleteExtra(last)}

  let t=current(),item=t?supersetCurrent(t):null;

}

function intervalBase(){return{running:false,phase:'ready',round:1,remaining:0,elapsed:0,completedRounds:0,finished:false,phaseEndsAt:null,runStartedAt:null}}

function toggleIntervals(){let t=current(),iv=normaliseInterval(t),now=Date.now();if(iv.finished)return;if(iv.running){iv.elapsed=intervalElapsed(iv,now);iv.remaining=intervalRemaining(iv,now);iv.running=false;iv.runStartedAt=null;iv.phaseEndsAt=null}else{if(iv.phase==='ready'){iv.phase='work';iv.remaining=num(t.workSec)}iv.running=true;iv.runStartedAt=now;iv.phaseEndsAt=now+Math.max(1,num(iv.remaining))*1000}save();train()}

function extractImportPayload(raw){let state=raw?.state&&typeof raw.state==='object'?raw.state:raw;let sessions=Array.isArray(state?.sessions)?state.sessions:(Array.isArray(raw?.sessions)?raw.sessions:[]),dailyCheckins=Array.isArray(state?.dailyCheckins)?state.dailyCheckins:(Array.isArray(raw?.dailyCheckins)?raw.dailyCheckins:[]),templates=Array.isArray(state?.templates)?state.templates:[],exercises=Array.isArray(state?.exercises)?state.exercises:[],settings=state?.settings||{};if(!state||typeof state!=='object')throw new Error('Backup state is missing.');return{state,sessions,dailyCheckins,templates,exercises,settings,build:raw?.build||state?.build||'unknown'}}
function legacyTemplate(t){let n=String(t.name||'');return legacyProgramRegex().test(n)||new RegExp(['fullbody','day','1'].join('\\s+'),'i').test(n)}
function mergeImportPayload(p){let addedSessions=0,addedCheckins=0,addedTemplates=0,updatedTemplates=0,addedExercises=0;S.sessions=S.sessions||[];S.dailyCheckins=S.dailyCheckins||[];S.templates=S.templates||[];S.exercises=S.exercises||[];for(const ex of p.exercises||[]){if(!ex||!ex.name)continue;let i=S.exercises.findIndex(x=>x.id===ex.id||String(x.name||'').toLowerCase()===String(ex.name||'').toLowerCase());if(i>=0)S.exercises[i]={...S.exercises[i],...clone(ex)};else{S.exercises.push(clone(ex));addedExercises++}}for(const t of p.templates||[]){if(!t||!t.id||legacyTemplate(t))continue;let y=clone(t);y.source=y.source||'THE-import';y.locked=false;y.builtIn=false;let i=S.templates.findIndex(a=>a.id===y.id);if(i>=0){S.templates[i]={...S.templates[i],...y};updatedTemplates++}else{S.templates.push(y);addedTemplates++}}for(const x of p.sessions||[]){if(!x||!x.id)continue;if(!S.sessions.some(s=>s.id===x.id)){let y=clone(x);if(legacyPrefixRegex().test(y.name||''))y.name=String(y.name).replace(legacyPrefixRegex(),'');S.sessions.push(y);addedSessions++}}for(const c of p.dailyCheckins||[]){if(!c||!c.date)continue;let i=S.dailyCheckins.findIndex(x=>x.date===c.date);if(i>=0)S.dailyCheckins[i]={...S.dailyCheckins[i],...c};else{S.dailyCheckins.push(clone(c));addedCheckins++}}S=upgradeAlpha2(S);ensureAllEntityMeta(S);save();return{addedSessions,addedCheckins,addedTemplates,updatedTemplates,addedExercises}}
function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let raw=JSON.parse(r.result),payload=extractImportPayload(raw),total=(payload.sessions||[]).length+(payload.dailyCheckins||[]).length+(payload.templates||[]).length+(payload.exercises||[]).length;if(!total)return alert('No workouts, check-ins, templates or exercises found in this file.');let message=`Backup valid.

Build: ${payload.build}
Sessions found: ${payload.sessions.length}
Check-ins found: ${payload.dailyCheckins.length}
Templates found: ${(payload.templates||[]).length}
Exercises found: ${(payload.exercises||[]).length}

Import and merge? Templates are editable in Builder Clean, so matching template IDs can be updated.`;if(!confirm(message))return;downloadJson(backupEnvelope(S),'THE-recovery-before-import.json');let result=mergeImportPayload(payload);alert(`Import complete — ${result.addedSessions} workouts added, ${result.addedCheckins} check-ins added, ${result.addedTemplates} templates added, ${result.updatedTemplates} templates updated, ${result.addedExercises} exercises added.`);render()}catch(error){alert('Could not parse file. Make sure it is valid JSON. '+error.message)}finally{ev.target.value=''}};r.readAsText(f)}
function resetLocal(){if(confirm('Delete all local THE data on this browser?')){removeStorage();location.reload()}}
function sheet(content){$('modalRoot').innerHTML=`<div class=modal onclick="if(event.target===this)closeSheet()"><div class=sheet><button class=close onclick=closeSheet()>×</button>${content}</div></div>`;growTextAreas()}function closeSheet(){$('modalRoot').innerHTML=''}window.addEventListener('pagehide',()=>{if(S)save('pagehide')});document.addEventListener('visibilitychange',()=>{if(S&&document.visibilityState==='hidden')save('background');if(S&&document.visibilityState==='visible')refreshStoragePersistence()});setInterval(()=>{let active=activeSession();if(active)syncWorkoutClock();tickIntervals();let t=active?current():null;if(t?.blockTimer?.on&&$('blockClock'))$('blockClock').textContent=fmt(blockElapsed(t))},1000);refreshStoragePersistence();render();
</script>

<script>
/* Live application extensions.
   Previously stranded in an inert <script type="text/plain"> block:
   - historyView() is called unguarded by the route table (History was broken).
   - Library v2 (Programs/Library tabs, 7-day Add, Edit/Delete, exercise search).
   - relabelLibrary() is invoked by the guarded hook in go(). */
function stripExplainers(){let pick=$('cType');if(pick)[...pick.options].forEach(o=>{if(!['easy','intervals'].includes(o.value))o.remove()})}
function historyView(){let rows=(S.sessions||[]).filter(s=>s.status==='completed').sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));let body=rows.length?`<div class=stack>${rows.map(x=>`<button class="card simplecard" style="text-align:left;width:100%" onclick="showSummary('${esc(x.id)}')"><div class=row><div><div class=title>${esc(x.name||'Completed workout')}</div><div class=meta>${dateLabel(x.date)} · ${x.summary?.sets||0} logged sets</div></div><span class=pill>View</span></div></button>`).join('')}</div>`:'<div class=empty><b>No completed workouts yet</b>Finish a session and it will appear here.</div>';shell('History','Completed workouts',body+`<div class=btns style="margin-top:14px"><button class="btn" onclick="go('home')">Back to Home</button></div>`)}
let libraryV2Tab='programs';
let libraryV2Flash='';
function libraryV2TabButton(key,label){return`<button class="libtab library-v2-tab ${libraryV2Tab===key?'active':''}" data-library-tab="${key}" onclick="setLibraryV2Tab('${key}')">${label}</button>`}
function setLibraryV2Tab(tab){libraryV2Tab=tab==='library'?'library':'programs';programs()}
function libraryV2ExerciseResultsHtml(q=''){
  let tokens=String(q||'').toLowerCase().trim().split(/\s+/).filter(Boolean);
  let filtered=(S.exercises||[]).filter(x=>tokens.every(token=>String(x.name||'').toLowerCase().includes(token))).sort((a,b)=>String(a.name||'').localeCompare(String(b.name||'')));
  let body=filtered.map(x=>`<div class="library-v2-exercise-row">${exerciseLinkHtml(x.name,x.id,x.category)}</div>`).join('');
  return body||'<div class=empty><b>No matching exercises</b>Try a different search.</div>';
}
function refreshLibraryV2Exercises(q){let results=$('libraryV2ExerciseResults');if(results)results.innerHTML=libraryV2ExerciseResultsHtml(q);let count=$('libraryV2ExerciseCount');if(count){let tokens=String(q||'').toLowerCase().trim().split(/\s+/).filter(Boolean);let n=(S.exercises||[]).filter(x=>tokens.every(token=>String(x.name||'').toLowerCase().includes(token))).length;count.textContent=`${n} exercise${n===1?'':'s'}`}}
function libraryV2Add(templateId){let t=tpl(templateId);if(!t)return;let start=today(),dates=Array.from({length:7},(_,i)=>datePlus(start,i));sheet(`<h2>Add ${esc(t.name)}</h2><p class=lead>Choose a date from today through the next six days.</p><div class="library-v2-date-grid">${dates.map((date,i)=>{let d=dateFromKey(date);return`<button class="library-v2-date ${i===0?'today':''}" onclick='libraryV2ConfirmAdd(${jsq(templateId)},${jsq(date)})'><span>${i===0?'Today':d.toLocaleDateString(undefined,{weekday:'short'})}</span><b>${d.getDate()}</b><small>${d.toLocaleDateString(undefined,{month:'short'})}</small></button>`}).join('')}</div><button class="btn block" style="margin-top:14px" onclick=closeSheet()>Cancel</button>`)}
function libraryV2ConfirmAdd(templateId,date){let t=tpl(templateId);if(!t||!addScheduledSession(t,date,true))return;S.selected=date;save('library-add');closeSheet();libraryV2Flash=`${t.name} added for ${dateLabel(date)}.`;programs()}
function libraryV2Menu(templateId){let t=tpl(templateId);if(!t)return;sheet(`<h2>${esc(t.name)}</h2><div class=stack><button class="btn block" onclick='closeSheet();editTemplateDirect(${jsq(templateId)})'>Edit</button><button class="btn danger block" onclick='libraryV2DeletePrompt(${jsq(templateId)})'>Delete</button><button class="btn block" onclick=closeSheet()>Cancel</button></div>`)}
function libraryV2DeletePrompt(templateId){let t=tpl(templateId);if(!t)return;sheet(`<h2>Delete ${esc(t.name)}?</h2><p class=lead>This removes it from your Library. Any scheduled copies will remain as saved sessions.</p><div class=two style="margin-top:14px"><button class="btn" onclick=closeSheet()>No</button><button class="btn danger" onclick='libraryV2Delete(${jsq(templateId)})'>Yes</button></div>`)}
function libraryV2Delete(templateId){let t=tpl(templateId);if(!t)return;if(isSeedTemplate(t)){S.hiddenTemplateIds=S.hiddenTemplateIds||[];if(!S.hiddenTemplateIds.includes(templateId))S.hiddenTemplateIds.push(templateId)}else{for(const s of S.sessions||[])if(s.templateId===templateId){s.templateId='';s.templateDeleted=true}S.templates=S.templates.filter(x=>x.id!==templateId)}save('library-delete');closeSheet();libraryV2Flash=`${t.name} deleted.`;programs()}
function libraryV2ProgramCard(t){return`<article class="library-v2-card"><div class="library-v2-card-head"><div><div class=eyebrow>Program</div><div class=library-v2-card-title>${esc(t.name)}</div><div class=library-v2-card-meta>${esc(templateShortMeta(t))}</div></div><div class=library-v2-card-actions><button class="btn primary small" onclick='libraryV2Add(${jsq(t.id)})'>＋ Add</button><button class="btn library-v2-menu" aria-label="More options for ${esc(t.name)}" onclick='libraryV2Menu(${jsq(t.id)})'>•••</button></div></div></article>`}
programs=function(){
  let templates=visibleTemplates().filter(t=>!t.programId),flash=libraryV2Flash;libraryV2Flash='';
  let hero=`<div class="library-v2-hero"><div class=eyebrow>THE HYBRID ENGINE</div><h2>Library</h2><p class=lead>Keep your programs ready and find exercises quickly.</p><div class=library-v2-tabs>${libraryV2TabButton('programs','Programs')}${libraryV2TabButton('library','Library')}</div></div>`;
  let body=hero+(flash?`<div class=notice style="margin-top:12px">${esc(flash)}</div>`:'');
  if(libraryV2Tab==='programs'){
    body+=`<div class=stack><button class="card simplecard" style="width:100%;text-align:left" onclick="newTemplateDirect('strength')"><div class=row><div><div class=eyebrow>Create</div><div class=title>Session Template</div><div class=meta>Build a new workout in the Builder.</div></div><span class=pill>＋</span></div></button>${S.draft?`<div class="card autosavecard"><div class=row><div><div class=title>Unfinished draft</div><div class=meta>${esc(S.draft.name||'Untitled workout')} · autosaved</div></div><span class=pill warn>Draft</span></div><div class=btns><button class="btn primary" onclick=resumeDraft()>Resume editing</button><button class="btn danger" onclick=discardDraft()>Discard</button></div></div>`:''}${templates.map(libraryV2ProgramCard).join('')||'<div class=empty><b>No programs yet</b>Create your first session template above.</div>'}</div>`;
  }else{
    body+=`<div class=stack><div class=field library-v2-search><label>Search exercises</label><input id=libraryV2ExerciseSearch placeholder="Search exercises" autocomplete=off oninput="refreshLibraryV2Exercises(this.value)"></div><div id=libraryV2ExerciseCount class=library-v2-count>${S.exercises.length} exercises</div><div id=libraryV2ExerciseResults class=library-v2-exercise-list>${libraryV2ExerciseResultsHtml()}</div></div>`;
  }
  body=`<div class=library-v2>${body}</div>`;
  shell('Library','Programs and exercises',body);
}
function relabelLibrary(){document.querySelectorAll('[data-tab="programs"] span').forEach(el=>{if(el.textContent!=='Library')el.textContent='Library'});document.querySelectorAll('#appScreen button').forEach(el=>{if(el.closest('.library-v2'))return;if(el.textContent.trim()==='Programs')el.textContent='Library'});let root=$('appScreen');if(root)root.querySelectorAll('*').forEach(el=>{if(el.closest('.library-v2')||el.children.length||!el.textContent)return;el.textContent=el.textContent.replace(/\bPrograms\b/g,'Library').replace(/Coach Tools?/g,'Builder tools').replace(/Coach swap/g,'Swap slot').replace(/Coach edit/g,'Edit workout').replace(/passcode/gi,'advanced access')});stripExplainers()}
if(typeof render==='function')render();
</script>
