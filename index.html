function ensureCoreLibrary(state){state=state||{};let current=state.exercises||[];for(const core of seed.exercises){let existing=current.find(x=>String(x.name||'').toLowerCase()===core.name.toLowerCase());if(existing){existing.category=core.category;existing.builtIn=true;existing.source=existing.source||core.source}else current.push(clone(core))}state.exercises=dedupe(current);return state}

function ensureEntityMeta(record,entity,state=S){if(!record||typeof record!=='object')return record;state=state||S;state.meta=state.meta||{};record._meta=record._meta||{};record._meta.entity=entity;record._meta.localId=record._meta.localId||record.id||localRecordId(entity);record._meta.ownerId=record._meta.ownerId||state.meta.ownerId;record._meta.deviceId=record._meta.deviceId||state.meta.deviceId;record._meta.createdAt=record._meta.createdAt||isoNow();record._meta.updatedAt=record._meta.updatedAt||record._meta.createdAt;record._meta.version=num(record._meta.version)||1;return record}

let saveStatusTimer=null;
function setSaveStatus(state='saved',label='Saved'){

  chip.className='savestatus '+(state==='bad'?'bad':state==='saving'?'saving':'ok');
  chip.textContent=label;

  let active=(state.sessions||[]).find(x=>x.id===state.active)||((state.sessions||[]).find(x=>x.status==='active'))||null;
  let completed=(state.sessions||[]).filter(x=>x.status==='completed').length;
  return {backupVersion:14,kind:'auto-recovery-snapshot',exportedAt:isoNow(),app:'THE — The Hybrid Engine',build:LOCAL_BUILD,summary:{completed,activeId:active?.id||null,lastSavedAt:state.meta?.lastSavedAt||''},state};
}
function writeRecoverySnapshot(json){
  try{localStorage.setItem(RECOVERY_STORAGE,json);return true}catch(e){return false}
}
function updateSaveMeta(reason='auto'){
  if(!S)return;

  S.meta.lastSaveReason=reason;

  let json=JSON.stringify(S);
  let ok=writeStorage(json);
  let recoveryOk=writeRecoverySnapshot(JSON.stringify(recoverySnapshot(S)));
  S.meta=S.meta||{};
  S.meta.saveHealth={main:ok?'ok':'failed',recovery:recoveryOk?'ok':'failed',checkedAt:S.meta.lastSavedAt,reason};
  if(ok)writeStorage(JSON.stringify(S));
  setSaveStatus(ok?'ok':'bad',ok?'Saved':'Save failed');

}function dedupe(a){let o=[];(a||[]).forEach(x=>{if(x.name&&!o.some(y=>y.name.toLowerCase()===x.name.toLowerCase()))o.push(x)});return o.sort((a,b)=>a.name.localeCompare(b.name))}function tpl(i){return S.templates.find(x=>x.id===i)}function ses(i){return S.sessions.find(x=>x.id===i)}function activeSession(){let x=ses(S.active)||S.sessions.find(s=>s.status==='active');if(x){S.active=x.id;return x}S.active=null;return null}function nav(show=true){$('bottomNav').classList.toggle('hidden',!show)}function clock(show=false){$('workoutClock').classList.toggle('show',show)}function shell(title,eyebrow,body){$('appScreen').innerHTML=`<div class=eyebrow>${esc(eyebrow)}</div><h1>${esc(title)}</h1>${storageNotice()}${body}`;try{window.scrollTo({top:0,behavior:'instant'})}catch(e){window.scrollTo(0,0)}}

function dataHealth(){S.meta=S.meta||{};let sessions=S.sessions||[],completed=sessions.filter(x=>x.status==='completed').length,scheduled=sessions.filter(x=>x.status==='scheduled').length,lastCompleted=sessions.filter(x=>x.status==='completed').sort((a,b)=>(b.completedAt||0)-(a.completedAt||0))[0],lastBackup=S.meta.lastBackupAt||'',completedAtBackup=num(S.meta.completedAtLastBackup),completedSinceBackup=Math.max(0,completed-completedAtBackup),needsBackup=completed>0&&(!lastBackup||completedSinceBackup>=7);return{completed,scheduled,lastCompleted,lastBackup,completedSinceBackup,needsBackup,templates:(S.templates||[]).length,checkins:Array.isArray(S.dailyCheckins)?S.dailyCheckins.length:0,exercises:(S.exercises||[]).length}}
function backupEnvelope(state=S){return{backupVersion:15,kind:'THE-local-backup',exportedAt:isoNow(),app:'THE — Hybrid System',build:LOCAL_BUILD,state:clone(state)}}

function intervalBase(){return{running:false,phase:'ready',round:1,remaining:0,elapsed:0,completedRounds:0,finished:false,phaseEndsAt:null,runStartedAt:null}}

function toggleIntervals(){let t=current(),iv=normaliseInterval(t),now=Date.now();if(iv.finished)return;if(iv.running){iv.elapsed=intervalElapsed(iv,now);iv.remaining=intervalRemaining(iv,now);iv.running=false;iv.runStartedAt=null;iv.phaseEndsAt=null}else{if(iv.phase==='ready'){iv.phase='work';iv.remaining=num(t.workSec)}iv.running=true;iv.runStartedAt=now;iv.phaseEndsAt=now+Math.max(1,num(iv.remaining))*1000}save();train()}

function syncIntervalClock(t){let iv=normaliseInterval(t),now=Date.now(),guard=0;if(iv.running&&iv.phaseEndsAt){while(!iv.finished&&now>=iv.phaseEndsAt&&guard++<100){let boundary=iv.phaseEndsAt;advanceInterval(true,boundary);iv=t.interval}if(guard>=100)return endIntervals(now)}return iv}
function tickIntervals(){let t=S.active?current():null;if(!t||t.kind!=='conditioning'||t.conditioningType!=='intervals'||!t.interval?.running)return;let iv=syncIntervalClock(t),elapsed=intervalElapsed(iv),remaining=intervalRemaining(iv),c=$('intervalClock'),m=$('intervalMeta');if(c)c.textContent=fmt(remaining);if(m)m.textContent=iv.finished?`Complete · elapsed ${fmt(iv.elapsed)}`:`Round ${Math.min(iv.round,t.rounds)} · ${iv.phase} · elapsed ${fmt(elapsed)}`;let now=Date.now();if(iv.finished||now-intervalLastPersist>=15000){intervalLastPersist=now;save('interval-checkpoint')}if(iv.finished)train()}
function endIntervals(at=Date.now()){let t=current(),iv=normaliseInterval(t);iv.elapsed=intervalElapsed(iv,at);iv.remaining=intervalRemaining(iv,at);iv.running=false;iv.runStartedAt=null;iv.phaseEndsAt=null;iv.finished=true;t.result.duration=num(t.result.duration)||num(iv.elapsed);t.result.roundsCompleted=num(t.result.roundsCompleted)||num(iv.completedRounds);save();train()}
function completeConditioning(){let t=current();if(t.blockTimer?.on)toggleBlockClock();t.result.duration=t.result.duration||blockElapsed(t);let error=validateConditioningResult(t);if(error)return alert(error);t.complete=true;save();nextTask()}function skipOptionalTask(){let t=current();if(!t.optional)return;t.skipped=true;t.complete=true;if(t.interval)t.interval.running=false;save();nextTask()}function completeTask(){current().complete=true;save();nextTask()}function nextTask(force=false){let x=ses(S.active),t=current();if(t&&!t.complete&&!force)return sheet(`<h2>This task is not complete</h2><p class=lead>Stay here, or move on and come back later.</p><div class=stack><button class="btn primary block" onclick=closeSheet()>Stay here</button><button class="btn block" onclick="closeSheet();nextTask(true)">Move on anyway</button></div>`);if(x.taskIndex<x.tasks.length-1){x.taskIndex++;save();train()}else finishSession()}function prevTask(){let x=ses(S.active);if(x.taskIndex>0){x.taskIndex--;save();train()}else previewSession(x.id)}
function blockElapsed(t){return num(t.blockTimer?.elapsed)+(t.blockTimer?.on?Math.floor((Date.now()-t.blockTimer.last)/1000):0)}function toggleBlockClock(){let t=current();t.blockTimer=t.blockTimer||{elapsed:0,on:false,last:null};if(t.blockTimer.on){t.blockTimer.elapsed=blockElapsed(t);t.blockTimer.on=false;t.blockTimer.last=null}else{t.blockTimer.on=true;t.blockTimer.last=Date.now()}save();train()}
function ensureSessionTimer(x){if(!x)return x;x.timer=x.timer||{elapsed:0,on:false,last:null};if(x.timer.elapsed===undefined)x.timer.elapsed=0;if(x.timer.on===undefined)x.timer.on=false;if(x.timer.last===undefined)x.timer.last=null;return x}
function workElapsed(x){x=ensureSessionTimer(x);return num(x.timer.elapsed)+(x.timer.on?Math.floor((Date.now()-x.timer.last)/1000):0)}function toggleWorkoutClock(){let x=ensureSessionTimer(ses(S.active));if(!x)return;if(x.timer.on){x.timer.elapsed=workElapsed(x);x.timer.on=false;x.timer.last=null}else{x.timer.on=true;x.timer.last=Date.now()}save();syncWorkoutClock()}function syncWorkoutClock(){let x=ensureSessionTimer(ses(S.active));if(!x)return;let b=$('workoutClock');b.textContent=fmt(workElapsed(x));b.classList.toggle('on',x.timer.on)}

function allStrengthEntries(x){let out=[];(x?.tasks||[]).forEach(t=>{if(t.kind==='strength')out.push({name:t.name,category:t.category,exerciseId:t.exerciseId,rows:t.rows||[]});if(t.kind==='superset')(t.exercises||[]).forEach(ex=>out.push({name:ex.name,category:ex.category,exerciseId:ex.exerciseId,rows:ex.rows||[]}))});return out}

function strengthVolume(rows){return(rows||[]).filter(x=>x.done&&x.targetKind!=='seconds').reduce((a,x)=>a+num(x.weight)*num(x.reps),0)}function taskStrengthRows(t){if(t.kind==='strength')return t.rows||[];if(t.kind==='superset')return(t.exercises||[]).flatMap(ex=>ex.rows||[]);return[]}function strengthLoad(rows){return strengthVolume(rows)/50}function hrTrimp(min,avg){let rest=num(S.profile.restingHr)||60,max=num(S.profile.maxHr)||190;if(!min||!avg||avg<=rest)return 0;let hrr=Math.max(0,Math.min(1,(avg-rest)/Math.max(1,max-rest))),coef=S.profile.sex==='female'?1.67:1.92;return min*hrr*(.64*Math.exp(coef*hrr))}function condLoad(t){let r=t.result||{},min=num(r.duration)/60||blockElapsed(t)/60;if(num(r.avgHr)>0){return{load:hrTrimp(min,num(r.avgHr)),method:'HR-based load',confidence:'high',scored:true}}return{load:0,method:'Conditioning completed — no load score unless average heart rate is logged.',confidence:'unknown',scored:false}}function finishSession(){let x=ses(S.active);if(!x)return go('home');let incomplete=x.tasks.map((t,i)=>({t,i})).filter(o=>!o.t.complete);if(incomplete.length){let f=incomplete[0].i;return sheet(`<h2>Finish workout?</h2><p class=lead>${incomplete.length} block${incomplete.length===1?' is':'s are'} not marked complete:</p><div class=stack>${incomplete.map(o=>`<button class="card soft" style="width:100%;text-align:left;border:1px solid var(--line)" onclick="closeSheet();jumpToTask(${o.i})"><div class=title>${esc(o.t.name||o.t.heading)}</div><div class=meta>Tap to open this block</div></button>`).join('')}</div><div class=stack><button class="btn primary block" onclick="closeSheet();jumpToTask(${f})">Go to ${esc(x.tasks[f].name||x.tasks[f].heading)}</button><button class="btn block" onclick="closeSheet();finishSessionForce()">Finish anyway</button><button class="btn ghost block" onclick=closeSheet()>Keep training</button></div>`)}finishSessionForce()}function jumpToTask(i){let x=ses(S.active);if(!x)return;x.taskIndex=Math.max(0,Math.min(x.tas function storageShieldStatus(){let persisted=S.meta?.storagePersisted;let last=S.meta?.lastSavedAt?new Date(S.meta.lastSavedAt).toLocaleString():'Not yet';return `<div class="card autosavecard"><div class=row><div><div class=eyebrow>Save Shield</div><div class=title>${persisted?'Protected storage':'Autosave on this device'}</div><div class=meta>Every set, note, check-in and completed workout saves to this browser automatically.<br>Last save: ${esc(last)}</div></div><span class="pill ${persisted?'ok':'warn'}">${persisted?'PROTECTED':'LOCAL'}</span></div><div class=autosavegrid><div class=stat><small>Primary save</small><b>${storageBroken?'WARN':'ON'}</b></div><div class=stat><small>Recovery copy</small><b>ON</b></div><div class=stat><small>Manual export</small><b>${dataHealth().completedSinceBackup}/7</b></div></div><div class=btns><button class="btn small primary" onclick=requestStoragePersistence()>Protect browser storage</button><button class="btn small" onclick=exportData()>Export safety backup</button></div><div class=meta style="margin-top:8px">Manual backups are still for changing phones, clearing browser data, or emergency restore.</div></div>`}

function trainingAdd(templateId){let t=tpl(templateId);if(!t)return;let start=today(),dates=Array.from({length:7},(_,i)=>datePlus(start,i));sheet(`<h2>Add ${esc(t.name)}</h2><p class=lead>Choose a date from today through the next six days.</p><div class="training-surface-date-grid">${dates.map((date,i)=>{let d=dateFromKey(date);return`<button class="training-surface-date ${i===0?'today':''}" onclick='trainingConfirmAdd(${jsq(templateId)},${jsq(date)})'><span>${i===0?'Today':d.toLocaleDateString(undefined,{weekday:'short'})}</span><b>${d.getDate()}</b><small>${d.toLocaleDateString(undefined,{month:'short'})}</small></button>`}).join('')}</div><button class="btn block" style="margin-top:14px" onclick=closeSheet()>Cancel</button>`)}
function trainingConfirmAdd(templateId,date){let t=tpl(templateId);if(!t||!addScheduledSession(t,date,true))return;S.selected=date;save('training-add');closeSheet();trainingFlash=`${t.name} added for ${dateLabel(date)}.`;programs()}
function trainingMenu(templateId){let t=tpl(templateId);if(!t)return;sheet(`<h2>${esc(t.name)}</h2><div class=stack><button class="btn block" onclick='closeSheet();editTemplateDirect(${jsq(templateId)})'>Edit</button><button class="btn danger block" onclick='trainingDeletePrompt(${jsq(templateId)})'>Delete</button><button class="btn block" onclick=closeSheet()>Cancel</button></div>`)}
function trainingDeletePrompt(templateId){let t=tpl(templateId);if(!t)return;sheet(`<h2>Delete ${esc(t.name)}?</h2><p class=lead>This removes the template. Scheduled copies remain as saved sessions.</p><div class=two style="margin-top:14px"><button class="btn" onclick=closeSheet()>No</button><button class="btn danger" onclick='trainingDelete(${jsq(templateId)})'>Yes</button></div>`)}
function trainingDelete(templateId){let t=tpl(templateId);if(!t)return;if(isSeedTemplate(t)){S.hiddenTemplateIds=S.hiddenTemplateIds||[];if(!S.hiddenTemplateIds.includes(templateId))S.hiddenTemplateIds.push(templateId)}else{for(const s of S.sessions||[])if(s.templateId===templateId){s.templateId='';s.templateDeleted=true}S.templates=S.templates.filter(x=>x.id!==templateId)}save('training-delete');closeSheet();trainingFlash=`${t.name} deleted.`;programs()}
function trainingProgramCard(t){return`<article class="training-surface-card"><div class="training-surface-card-head"><div><div class=eyebrow>Session</div><div class=training-surface-card-title>${esc(t.name)}</div><div class=training-surface-card-meta>${esc(templateShortMeta(t))}</div></div><div class=training-surface-card-actions><button class="btn primary small" onclick='trainingAdd(${jsq(t.id)})'>＋ Add</button><button class="btn training-surface-menu" aria-label="More options for ${esc(t.name)}" onclick='trainingMenu(${jsq(t.id)})'>•••</button></div></div></article>`}
function programs(){let templates=visibleTemplates().filter(t=>!t.programId),flash=trainingFlash;trainingFlash='';let hero=`<div class="training-surface-hero"><div class=eyebrow>THE HYBRID ENGINE</div><h2>Training</h2><p class=lead>Run the plan. Find the resources. Keep the work simple.</p><div class=training-surface-tabs>${trainingTabButton('programs','Programs')}${trainingTabButton('resources','Resources')}</div></div>`;let body=hero+(flash?`<div class=notice style="margin-top:12px">${esc(flash)}</div>`:'');if(trainingTab==='programs'){body+=`<div class=stack><button class="card simplecard" style="width:100%;text-align:left" onclick="newTemplateDirect('strength')"><div class=row><div><div class=eyebrow>Create</div><div class=title>Session template</div><div class=meta>Build a workout in the Builder.</div></div><span class=pill>＋</span></div></button>${S.draft?`<div class="card autosavecard"><div class=row><div><div class=title>Unfinished draft</div><div class=meta>${esc(S.draft.name||'Untitled workout')} · autosaved</div></div><span class="pill warn">Draft</span></div><div class=btns><button class="btn primary" onclick=resumeDraft()>Resume editing</button><button class="btn danger" onclick=discardDraft()>Discard</button></div></div>`:''}${templates.map(trainingProgramCard).join('')||'<div class=empty><b>No session templates yet</b>Create your first workout above.</div>'}</div>`}else{body+=`<div class=stack><div class=two>${resourceButton('exercise','Exercise Library','Search movements and review logged history.')}${resourceButton('mobility','Mobility Library','Find movement prep and recovery flows.')}</div>${trainingResource==='exercise'?`<div class=stack><div class=field><label>Search exercises</label><input id=trainingExerciseSearch placeholder="Search exercises" autocomplete=off oninput="refreshTrainingExercises(this.value)"></div><div id=trainingExerciseResults class=stack>${trainingExerciseResults()}</div></div>`:`<div class=stack><div class=field><label>Search mobility</label><input id=trainingMobilitySearch placeholder="Search mobility" autocomplete=off oninput="refreshTrainingMobility(this.value)"></div><div id=trainingMobilityResults class=stack>${trainingMobilityResults()}</div></div>`}</div>`}shell('Training','Programs and resources',`<div class=training-surface>${body}</div>`)}
</script>

<script src="./integrations-ui.js"></script>
