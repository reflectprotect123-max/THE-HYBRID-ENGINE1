<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>THE — The Hybrid Engine</title>
<meta name="theme-color" content="#080808" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="THE" />
<style>
:root{
  --bg:#080808; --panel:#111110; --panel2:#181816; --panel3:#0c0c0b;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.12);
  --text:#f5f1e9; --muted:#aaa49a; --dim:#777168;
  --gold:#c09358; --gold2:#e0bc87; --gold-wash:rgba(192,147,88,.09);
  --blue:#82a8e9; --blue2:#6793ee;
  --ok:#9fc59b; --warn:#d1a464; --bad:#cf7f7c;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:#050505;color-scheme:dark}
body{
  min-height:100dvh;color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  background:radial-gradient(circle at 50% -18%,rgba(192,147,88,.09),transparent 34rem),var(--bg);
  -webkit-font-smoothing:antialiased;
}
.frame{display:grid;grid-template-columns:260px 1fr;min-height:100dvh}

/* ===== Sidebar (desktop) / bottom bar (mobile) ===== */
.side{
  position:sticky;top:0;align-self:start;height:100dvh;
  display:flex;flex-direction:column;
  padding:24px 14px 18px;border-right:1px solid var(--line);
  background:linear-gradient(180deg,rgba(20,20,19,.9),rgba(10,10,9,.9));
}
.brand{display:flex;align-items:center;gap:11px;padding:2px 8px 20px}
.mark{
  display:grid;place-items:center;width:42px;height:42px;flex:0 0 auto;
  border:1px solid rgba(224,188,135,.72);border-radius:12px;
  background:linear-gradient(145deg,rgba(192,147,88,.14),rgba(192,147,88,.02));
  color:var(--gold2);font-weight:900;font-size:11px;letter-spacing:.12em;
}
.brand b{display:block;font-size:14px;letter-spacing:.22em}
.brand small{display:block;margin-top:2px;color:#8f887e;font-size:8px;letter-spacing:.18em;text-transform:uppercase}
.nav{display:flex;flex-direction:column;gap:4px}
.navlink{
  position:relative;display:flex;align-items:center;gap:13px;min-height:50px;padding:0 14px;
  border:0;border-radius:13px;background:transparent;color:var(--muted);
  font:inherit;font-size:14px;font-weight:640;cursor:pointer;transition:.15s ease;text-align:left;
}
.navlink svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;fill:none;flex:0 0 auto}
.navlink:hover{background:rgba(255,255,255,.035);color:var(--text)}
.navlink.active{background:linear-gradient(180deg,var(--gold-wash),rgba(192,147,88,.03));color:var(--gold2)}
.navlink.active::before{
  content:"";position:absolute;left:5px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:99px;background:var(--gold);box-shadow:0 0 10px rgba(224,188,135,.35);
}
.sidenote{margin-top:auto;padding:12px;border:1px solid var(--line);border-radius:13px;background:var(--panel3);color:var(--muted);font-size:11px;line-height:1.5}
.sidenote b{color:var(--text)}

.main{padding:26px 26px 60px;max-width:820px;width:100%;margin:0 auto}
.screen{display:none}.screen.on{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.kicker{color:var(--gold2);font-size:11px;font-weight:800;letter-spacing:.19em;text-transform:uppercase;margin-bottom:7px}
h1{font-size:clamp(26px,4.5vw,34px);line-height:1.05;letter-spacing:-.04em;font-weight:850}
.sub{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.55}
.card{
  border:1px solid var(--line);border-radius:var(--r);
  background:linear-gradient(165deg,rgba(20,20,19,.98),rgba(14,14,13,.98));
  box-shadow:0 12px 34px rgba(0,0,0,.20),inset 0 1px rgba(255,255,255,.018);
}

/* ===== Rest chip (global, header-style, non-blocking) ===== */
.restchip{
  position:fixed;top:12px;right:12px;z-index:60;display:none;align-items:center;gap:9px;
  padding:9px 13px;border:1px solid rgba(224,188,135,.72);border-radius:999px;
  background:rgba(18,18,17,.95);box-shadow:0 14px 38px rgba(0,0,0,.4);
  font-variant-numeric:tabular-nums;cursor:pointer;
}
.restchip.show{display:inline-flex;animation:fade .18s ease}
.restchip small{color:var(--gold2);font-size:9px;letter-spacing:.16em;text-transform:uppercase}
.restchip b{font-size:19px;letter-spacing:-.04em}
.restchip span{color:var(--dim);font-size:10px}

/* ===== HOME ===== */
.week{margin-top:22px;padding:14px 10px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{display:grid;justify-items:center;gap:7px;padding:6px 2px;text-align:center}
.wd span{color:var(--dim);font-size:10px;font-weight:700;letter-spacing:.1em}
.wd b{font-size:15px;font-weight:750;width:34px;height:34px;display:grid;place-items:center;border-radius:50%}
.wd.today b{background:var(--gold);color:#17120c;box-shadow:0 6px 16px rgba(192,147,88,.28)}
.wd.has b{border:1px solid rgba(224,188,135,.4)}
.sessioncard{margin-top:14px;padding:16px;cursor:pointer;transition:.15s ease;position:relative;overflow:hidden}
.sessioncard:hover{border-color:rgba(224,188,135,.4);transform:translateY(-1px)}
.sessioncard::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 92% 0,rgba(192,147,88,.14),transparent 45%)}
.sc-kicker{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2)}
.sessioncard h3{margin-top:5px;font-size:19px;font-weight:850;letter-spacing:-.02em}
.sc-meta{margin-top:4px;color:var(--muted);font-size:12px}
.sc-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
.chip{padding:5px 9px;border:1px solid var(--line2);border-radius:999px;color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase}
.chip.gold{border-color:rgba(198,154,97,.42);background:var(--gold-wash);color:var(--gold2)}
.whoopmini{margin-top:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;justify-content:space-between;border-color:rgba(130,168,233,.28)}
.whoopmini .ring{
  width:52px;height:52px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--ok) 61%,rgba(255,255,255,.1) 0);position:relative;
}
.whoopmini .ring::before{content:"";position:absolute;inset:5px;border-radius:inherit;background:#17191e}
.whoopmini .ring b{position:relative;z-index:1;font-size:14px}
.whoopmini div p{color:var(--muted);font-size:11px;margin-top:3px}
.whoopmini div b{font-size:13px}

/* ===== SESSION (day view) ===== */
.backrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.backbtn{display:grid;place-items:center;width:38px;height:38px;border:1px solid var(--line);border-radius:11px;background:var(--panel2);color:var(--text);cursor:pointer;font-size:17px}
.section{margin-top:26px}
.sec-head{display:flex;align-items:baseline;gap:10px}
.sec-head h2{font-size:15px;font-weight:850;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2)}
.sec-head span{color:var(--dim);font-size:11px}
.sec-format{margin-top:3px;color:var(--muted);font-size:12px}
.exrow{
  margin-top:10px;padding:13px 14px;display:flex;align-items:center;gap:12px;justify-content:space-between;
  cursor:pointer;transition:.15s ease;
}
.exrow:hover{border-color:rgba(224,188,135,.4)}
.exrow .t b{display:block;font-size:14px;font-weight:800}
.exrow .t span{display:block;margin-top:3px;color:var(--muted);font-size:11.5px}
.exrow .t span i{font-style:normal;color:var(--gold2)}
.exrow .st{flex:0 0 auto;width:26px;height:26px;border:2px solid var(--line2);border-radius:50%;display:grid;place-items:center;color:transparent;font-size:13px;font-weight:900}
.exrow.done .st{border-color:var(--gold);background:var(--gold);color:#17120c}
.superwrap{margin-top:10px;padding-left:11px;border-left:3px solid var(--gold)}
.superlabel{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px}
.superlabel span{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.markall{border:0;background:transparent;color:var(--gold2);font:inherit;font-size:12px;font-weight:750;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.completebar{margin-top:30px}
.bigbtn{
  width:100%;min-height:56px;border:1px solid #c99a5d;border-radius:14px;cursor:pointer;
  background:linear-gradient(180deg,#c89b62,#b4864d);color:#17120c;font:inherit;font-size:15px;font-weight:850;
  box-shadow:inset 0 1px rgba(255,255,255,.23),0 10px 24px rgba(110,72,26,.22);transition:.15s ease;
}
.bigbtn:hover{background:linear-gradient(180deg,#d0a66f,#bb8e52)}
.bigbtn.donestate{background:var(--panel2);color:var(--ok);border-color:rgba(159,197,155,.46);box-shadow:none}

/* ===== LOGGER ===== */
.logmeta{margin-top:4px;color:var(--muted);font-size:12px}
.logmeta i{font-style:normal;color:var(--gold2)}
.setcard{margin-top:16px;padding:15px}
.sethead{display:grid;grid-template-columns:34px 1fr 1fr 64px 40px;gap:8px;padding:0 0 9px;color:#9a938a;font-size:10.5px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}
.settarget{margin-top:13px;margin-bottom:6px;color:var(--gold2);font-size:12px;font-weight:750;letter-spacing:-.01em}
.exrow .chev{width:26px;height:26px;flex:0 0 auto;display:grid;place-items:center;color:var(--dim);font-size:24px;font-weight:400;line-height:1}
.exrow.nav:hover .chev{color:var(--gold2)}
.setrow{display:grid;grid-template-columns:34px 1fr 1fr 64px 40px;gap:8px;align-items:center;padding:9px 0;border-top:1px solid var(--line)}
.setrow .n{display:grid;justify-items:center;gap:2px}
.setrow .n b{color:var(--muted);font-size:13px;font-weight:900}
.setrow .n small{color:var(--gold2);font-size:8.5px;font-weight:800;letter-spacing:.04em;white-space:nowrap}
.setrow input{
  width:100%;min-height:42px;padding:8px;border:1px solid var(--line2);border-radius:11px;
  background:#0b0b0a;color:var(--text);font:inherit;text-align:center;outline:none;
}
.setrow input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(192,147,88,.11)}
.setrow .rpein{border-color:rgba(224,188,135,.35)}
.tick{
  width:36px;height:36px;justify-self:end;border:2px solid var(--line2);border-radius:50%;
  background:transparent;color:transparent;font-size:15px;font-weight:900;cursor:pointer;transition:.15s ease;
}
.setrow.done .tick{border-color:var(--gold);background:var(--gold);color:#17120c}
.setrow.done input{opacity:.65}
.lastbox{margin-top:12px;padding:11px 14px;color:var(--muted);font-size:12px}
.lastbox b{color:var(--text)}
.guidebar{
  margin-top:14px;padding:12px 14px;border-color:rgba(224,188,135,.3);background:rgba(192,147,88,.05);
  color:var(--muted);font-size:12px;line-height:1.55;
}
.guidebar b{color:var(--gold2)}

/* ===== BUILDER ===== */
.field{display:grid;gap:6px;margin-top:14px}
.field label{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.field input,.field select{
  width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--line2);border-radius:12px;
  background:#0b0b0a;color:var(--text);font:inherit;outline:none;
}
.field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(192,147,88,.11)}
.buildergrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bsetrow{display:grid;grid-template-columns:52px 1fr 1fr;gap:8px;align-items:center;margin-top:8px}
.bsetrow.nomode{grid-template-columns:52px 1fr}
.bsetrow span{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.bsetrow input{min-height:42px;padding:8px;border:1px solid var(--line2);border-radius:11px;background:#0b0b0a;color:var(--text);font:inherit;text-align:center;outline:none}
.bsetrow input:focus{border-color:var(--gold)}
.bsetrow input.rpe{border-color:rgba(224,188,135,.35)}
.bsetrow .cmeta{color:var(--dim);font-size:11px}
.stepbtn{flex:1;min-height:50px;border:0;background:transparent;color:var(--gold2);font:inherit;font-size:22px;font-weight:900;cursor:pointer}
.stepbtn:hover{background:rgba(255,255,255,.035)}
.rxpreview{margin-top:14px;padding:13px 15px;border-color:rgba(224,188,135,.3)}
.rxpreview b{color:var(--gold2);font-size:16px;font-weight:900}
.rxpreview p{margin-top:4px;color:var(--muted);font-size:12px}
.newtag{display:inline-block;margin-left:7px;padding:2px 7px;border-radius:99px;background:var(--gold);color:#17120c;font-size:8.5px;font-weight:900;letter-spacing:.08em;vertical-align:middle}

/* ===== Builder authoring ===== */
.addbtn{margin-top:14px;width:100%;min-height:48px;border:1px dashed var(--line2);border-radius:13px;
  background:transparent;color:var(--gold2);font:inherit;font-size:13px;font-weight:750;cursor:pointer;transition:.15s ease}
.addbtn:hover{border-color:rgba(224,188,135,.5);background:var(--gold-wash)}
.addbtn.small{min-height:42px;margin-top:10px;font-size:12px}
.bblock{margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:var(--r);
  background:linear-gradient(165deg,rgba(22,22,20,.98),rgba(14,14,13,.98))}
.bblock-head{display:flex;gap:10px;align-items:center}
.bhead{flex:1;min-height:44px;padding:9px 12px;border:1px solid var(--line2);border-radius:11px;
  background:#0b0b0a;color:var(--text);font:inherit;font-size:15px;font-weight:800;outline:none}
.bhead:focus{border-color:var(--gold)}
.bexp{width:40px;height:44px;flex:0 0 auto;border:0;background:transparent;color:var(--gold2);font:inherit;font-size:13px;cursor:pointer;border-radius:10px}
.bexp:hover{background:rgba(255,255,255,.04)}
.bsummary{margin-top:10px;padding:2px 2px 2px 46px;color:var(--muted);font-size:12px;line-height:1.5;cursor:pointer}
.bctrls{display:flex;gap:5px;flex:0 0 auto}
.bctrls button{width:40px;height:40px;border:1px solid var(--line2);border-radius:10px;background:var(--panel2);
  color:var(--muted);font:inherit;font-size:14px;cursor:pointer}
.bctrls button:hover{color:var(--text);border-color:var(--gold)}
.bctrls .del:hover,.del:hover{color:var(--bad);border-color:rgba(207,127,124,.6)}
.brow2{display:grid;grid-template-columns:60px minmax(0,1fr) auto;gap:8px;align-items:center;margin-top:9px}
.brow2 input{min-height:40px;padding:8px 10px;border:1px solid var(--line2);border-radius:10px;background:#0b0b0a;color:var(--text);font:inherit;font-size:12px;outline:none}
.brow2 input:focus{border-color:var(--gold)}
.bss{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.bss input{width:18px;height:18px;accent-color:var(--gold)}
.bex{margin-top:11px;padding:12px;border:1px solid var(--line);border-left:3px solid rgba(192,147,88,.42);border-radius:14px;background:#15130f}
.bex-head{display:flex;gap:9px;align-items:center}
.bexname{flex:1;min-height:42px;padding:8px 11px;border:1px solid var(--line2);border-radius:11px;background:#0b0b0a;color:var(--text);font:inherit;font-size:14px;font-weight:750;outline:none}
.bexname:focus{border-color:var(--gold)}
.bex-head .del{width:40px;height:40px;flex:0 0 auto;border:1px solid var(--line2);border-radius:10px;background:var(--panel2);color:var(--muted);font:inherit;cursor:pointer}
.bex-grid{display:grid;grid-template-columns:minmax(0,1fr) 88px 72px;gap:8px;margin-top:9px}
.bex-grid select,.bex-grid input{min-height:42px;padding:8px 10px;border:1px solid var(--line2);border-radius:11px;background:#0b0b0a;color:var(--text);font:inherit;font-size:12.5px;outline:none}
.bex-grid select:focus,.bex-grid input:focus{border-color:var(--gold)}
.bsteprow{display:flex;align-items:center;margin-top:11px;border:1px solid var(--line2);border-radius:12px;overflow:hidden}
.bsteprow span{flex:1.6;text-align:center;color:var(--muted);font-size:11px;font-weight:850;letter-spacing:.1em;text-transform:uppercase;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.stepbtn.sm{min-height:42px}
.rxline{margin-top:11px;padding:10px 12px;border:1px solid rgba(224,188,135,.3);border-radius:11px;background:rgba(192,147,88,.05);color:var(--gold2);font-size:13px;font-weight:800;letter-spacing:-.01em;overflow-wrap:anywhere}
.main{min-width:0}
#s-builder input,#s-builder select{min-width:0}
.bblock,.bex{min-width:0}

/* ===== confetti ===== */
.confetti{position:fixed;top:-10px;z-index:80;width:9px;height:14px;border-radius:2px;pointer-events:none;animation:drop 1.5s ease-in forwards}
@keyframes drop{to{transform:translateY(105vh) rotate(540deg);opacity:.2}}

/* ===== Mobile: sidebar swings to bottom nav ===== */
@media(max-width:760px){
  .frame{grid-template-columns:1fr}
  .main{padding:20px 16px calc(92px + env(safe-area-inset-bottom))}
  .side{
    position:fixed;z-index:50;left:0;right:0;bottom:0;top:auto;height:auto;
    flex-direction:row;padding:7px 8px calc(7px + env(safe-area-inset-bottom));
    border-right:0;border-top:1px solid var(--line);
    background:rgba(8,8,8,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
    box-shadow:0 -12px 32px rgba(0,0,0,.25);
  }
  .brand,.sidenote{display:none}
  .nav{flex-direction:row;width:100%;gap:2px}
  .navlink{flex:1;flex-direction:column;gap:4px;min-height:54px;padding:6px 2px;font-size:9.5px;justify-content:center;text-align:center}
  .navlink.active::before{left:50%;top:3px;transform:translateX(-50%);width:20px;height:2px}
  .sethead{grid-template-columns:30px 1fr 1fr 54px 38px;gap:5px}
  .setrow{grid-template-columns:30px 1fr 1fr 54px 38px;gap:5px}
  .restchip{top:10px;right:10px}
}

/* ===== additions beyond the mock: history, readiness, scheduling, calmer builder ===== */
.wd{cursor:pointer;border-radius:12px;transition:.15s ease}
.wd:hover{background:rgba(255,255,255,.03)}
.histnav{display:flex;justify-content:space-between;margin-top:2px}
.exrow.plain{cursor:default}
.exrow.plain:hover{border-color:var(--line)}
.daychips{display:flex;gap:6px;flex-wrap:wrap}
.daychip{padding:6px 11px;border:1px solid var(--line2);border-radius:999px;background:transparent;color:var(--muted);font:inherit;font-size:10px;font-weight:750;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:.15s ease}
.daychip:hover{border-color:rgba(224,188,135,.4)}
.daychip.on{border-color:rgba(198,154,97,.42);background:var(--gold-wash);color:var(--gold2)}
.bex-grid.solo{grid-template-columns:1fr}
/* WHOOP-style dual ring: outer = strain (blue), inner = recovery (WHOOP colors) */
.ringx{width:62px;height:62px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center}
.ringx-in{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;position:relative}
.ringx-in::before{content:"";position:absolute;inset:5px;border-radius:inherit;background:#17191e}
.ringx-in b{position:relative;z-index:1;font-size:12px}
</style>
</head>
<body>

<div class="restchip" id="restchip" onclick="stopRest()">
  <small>Rest</small><b id="restclock">3:00</b><span>tap to stop</span>
</div>

<div class="frame">
  <aside class="side">
    <div class="brand">
      <div class="mark">THE</div>
      <div><b>THE</b><small>The Hybrid Engine</small></div>
    </div>
    <nav class="nav">
      <button class="navlink active" data-s="home" onclick="go('home',this)">
        <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></svg>
        Home
      </button>
      <button class="navlink" data-s="training" onclick="go('training',this)">
        <svg viewBox="0 0 24 24"><rect x="4" y="3.5" width="16" height="17" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
        Training
      </button>
      <button class="navlink" data-s="logger" onclick="goLogger(this)">
        <svg viewBox="0 0 24 24"><path d="M4 17V9M9.5 17V5M15 17v-7M20 17V8"/></svg>
        Logger
      </button>
      <button class="navlink" data-s="builder" onclick="go('builder',this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6l-.04.08H10l-.04-.08a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1l-.08-.04V10l.08-.04a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6l.04-.08H14l.04.08a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.1.4.3.75.6 1l.08.04V14l-.08.04c-.3.25-.5.6-.6.96Z"/></svg>
        Builder
      </button>

    <div class="sidenote"><b id="sideStatus">Saved locally</b><br>Your workouts and logged sets live on this device. <button class="markall" style="padding:0" onclick="go('settings')">Settings →</button></div>
  </aside>

  <main class="main">
    <section class="screen on" id="s-home"></section>
    <section class="screen" id="s-training"></section>
    <section class="screen" id="s-logger"></section>

</div>

<datalist id="exNames"></datalist>

<script src="./vendor/supabase-2.110.7.js"></script>
<script>
/* ============================================================
   THE Hybrid Engine — the design mock, made real.
   Every screen renders the mock's exact markup; underneath,
   a persistent local-first engine: workouts, live sessions,
   history, WHOOP (server-side) and optional cloud sync.
   ============================================================ */

/* ---------- persistence ---------- */
const LS_KEY='hybrid-engine-v1';
let DB={workouts:[],sessions:[],settings:{}};
function uid(){return Math.random().toString(36).slice(2,10)}
function load(){try{const raw=localStorage.getItem(LS_KEY);if(raw){DB=Object.assign({workouts:[],sessions:[],settings:{}},JSON.parse(raw))}}catch(e){}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(DB));flashSaved()}catch(e){}if(typeof queueCloudPush==='function')queueCloudPush();}
let savedTimer=null;
function flashSaved(){const el=document.getElementById('sideStatus');if(!el)return;el.textContent='Saved ✓';clearTimeout(savedTimer);savedTimer=setTimeout(()=>{if(el)el.textContent='Saved locally'},1200)}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- shared training model ---------- */
const MODES={
  reps_kg:{label:'Reps + Kilos',unit:'',ph:'reps'},
  seconds:{label:'Seconds',unit:'s',ph:'secs'},
  reps_seconds:{label:'Reps + Seconds',unit:'s',ph:'secs'},
  reps:{label:'Reps only',unit:'',ph:'reps'},
  completion:{label:'For completion',unit:'',ph:''},
};
const MODEKEYS=Object.keys(MODES);
function newSet(){return{t:'',rpe:''}}
function newEx(){return{id:uid(),name:'',mode:'reps_kg',tempo:'',rest:90,sets:[newSet(),newSet(),newSet()]}}
function newBlock(){return{id:uid(),heading:'New block',minutes:'',format:'',superset:false,exercises:[newEx()]}}
function fmtRest(s){s=+s||0;return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function rxLine(ex){
  const cfg=MODES[ex.mode]||MODES.reps_kg,n=ex.sets.length;let rx;
  if(ex.mode==='completion'){rx=n+' × complete'}
  else{
    const vals=ex.sets.map(s=>(s.t||'—')+cfg.unit),u=[...new Set(vals)];
    rx=n+' × '+(u.length===1?u[0]:vals.join('/'));
    const rpes=ex.sets.map(s=>s.rpe).filter(Boolean);
    if(rpes.length){const uu=[...new Set(rpes)];rx+=' · RPE '+(uu.length===1?uu[0]:rpes[0]+'→'+rpes[rpes.length-1])}
  }
  if(ex.tempo)rx+=' · @'+ex.tempo;
  if(ex.rest)rx+=' · rest '+fmtRest(ex.rest);
  return rx;
}
function blockCountLabel(w){
  const exs=(w.blocks||[]).reduce((n,b)=>n+(b.exercises||[]).length,0);
  return (w.blocks||[]).length+' block'+((w.blocks||[]).length===1?'':'s')+' · '+exs+' exercise'+(exs===1?'':'s');
}

/* ---------- navigation ---------- */
let CURRENT='home';
function go(id,btn){
  CURRENT=id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const scr=document.getElementById('s-'+id);if(scr)scr.classList.add('on');
  document.querySelectorAll('.navlink').forEach(b=>b.classList.remove('active'));
  const navBtn=btn||document.querySelector('.navlink[data-s="'+id+'"]');
  if(navBtn)navBtn.classList.add('active');
  renderScreen(id);
  window.scrollTo({top:0});
}
function renderScreen(id){
  if(id==='home')renderHome();
  else if(id==='training')renderTraining();
  else if(id==='logger')renderLoggerScreen();
  else if(id==='builder')renderBuilder();
  else if(id==='settings')renderSettings();
  else if(id==='history')renderHistory();
}

/* ---------- week strip (Sunday-first, exactly like the mock) ---------- */
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function weekDays(){
  const now=new Date(),sun=new Date(now);sun.setDate(now.getDate()-now.getDay());
  const todayKey=ymd(now),out=[];
  for(let i=0;i<7;i++){const d=new Date(sun);d.setDate(sun.getDate()+i);const k=ymd(d);
    const trained=DB.sessions.some(s=>s.date===k);
    const planned=k>=todayKey&&DB.workouts.some(w=>(w.days||[]).includes(d.getDay()));
    out.push({key:k,dow:'SMTWTFS'[d.getDay()],num:d.getDate(),today:k===todayKey,has:trained||planned})}
  return out;
}
function weekStripHtml(){
  return '<div class="card week">'+weekDays().map(d=>
    '<div class="wd'+(d.today?' today':'')+(d.has?' has':'')+'" onclick="openHistory(\''+d.key+'\')" title="View this day"><span>'+d.dow+'</span><b>'+d.num+'</b></div>').join('')+'</div>';
}

/* ---------- HISTORY (tap any week-strip day) ---------- */
let HIST_DATE=null;
function openHistory(key){HIST_DATE=key;go('history');}
function shiftHistory(d){const p=HIST_DATE.split('-');const dt=new Date(+p[0],+p[1]-1,+p[2]+d);HIST_DATE=ymd(dt);renderHistory();}
function loggedSetSummary(ex,st){
  if(ex.mode==='completion')return '✓';
  const bits=[];
  if(st.aVal)bits.push(st.aVal+(ex.mode==='seconds'||ex.mode==='reps_seconds'?'s':(ex.mode==='reps_kg'?'kg':'')));
  if(st.aVal2)bits.push('× '+st.aVal2);
  if(st.felt)bits.push('@RPE '+st.felt);
  return bits.join(' ')||'✓';
}
function renderHistory(){
  const el=document.getElementById('s-history');if(!el)return;
  if(!HIST_DATE)HIST_DATE=ymd(new Date());
  const done=DB.sessions.filter(s=>s.date===HIST_DATE&&s.status!=='active');
  const active=DB.sessions.filter(s=>s.date===HIST_DATE&&s.status==='active');
  let body='';
  done.forEach(s=>{
    body+='<div class="section"><div class="sec-head"><h2>'+esc(s.name||'Workout')+'</h2><span>'+(s.status==='incomplete'?'incomplete':'completed')+'</span></div>';
    s.blocks.forEach(b=>{b.exercises.forEach(ex=>{
      const logged=ex.sets.filter(st=>st.done||st.aVal||st.aVal2||st.felt);
      const allDone=ex.sets.length&&ex.sets.every(st=>st.done);
      const sum=logged.length?logged.map(st=>loggedSetSummary(ex,st)).join(' · '):'—';
      body+='<div class="card exrow plain'+(allDone?' done':'')+'"><div class="t"><b>'+esc(ex.name||'Exercise')+'</b><span>'+esc(b.heading)+' · '+esc(sum)+'</span></div><div class="st">✓</div></div>';
    });});
    body+='</div>';
  });
  if(active.length)body+='<div class="card guidebar" style="margin-top:16px">A session from this day is still in progress — it will appear here once finished.</div>';
  if(!body)body='<div class="card lastbox" style="margin-top:16px">No training logged this day.</div>';
  el.innerHTML=
    '<div class="backrow"><button class="backbtn" onclick="go(\'home\')">←</button><div><div class="kicker" style="margin-bottom:3px">History</div><h1 style="font-size:24px">'+esc(prettyDay(HIST_DATE))+'</h1></div></div>'+
    '<div class="histnav"><button class="markall" onclick="shiftHistory(-1)">‹ Previous day</button><button class="markall" onclick="shiftHistory(1)">Next day ›</button></div>'+
    body;
}

/* ---------- HOME (mock layout: greeting, week, session card, WHOOP mini) ---------- */
function activeSession(){return DB.sessions.find(s=>s.status==='active')||null}
function workoutKind(w){
  const strength=w.blocks.some(b=>b.exercises.some(e=>e.mode==='reps_kg'));
  const conditioning=w.blocks.some(b=>b.exercises.some(e=>e.mode==='seconds'||e.mode==='reps_seconds'));
  return [strength?'Strength':'',conditioning?'Conditioning':''].filter(Boolean).join(' + ')||'Session';
}
function workoutChips(w){
  const mins=(w.blocks||[]).reduce((n,b)=>n+(+b.minutes||0),0);
  const exs=(w.blocks||[]).reduce((n,b)=>n+(b.exercises||[]).length,0);
  const rpe=w.blocks.some(b=>b.exercises.some(e=>e.sets.some(s=>s.rpe)));
  const tempo=w.blocks.some(b=>b.exercises.some(e=>e.tempo));
  const chips=[];
  chips.push('<span class="chip gold">'+(mins?'~'+mins+' min':exs+' exercises')+'</span>');
  if(rpe)chips.push('<span class="chip">RPE-based</span>');
  if(tempo)chips.push('<span class="chip">Tempo work</span>');
  return chips.join('');
}
function sessionCardHtml(w,kicker,onclick){
  return '<div class="card sessioncard" onclick="'+onclick+'">'+
    '<div class="sc-kicker">'+esc(kicker)+'</div>'+
    '<h3>'+esc(w.name||'Untitled workout')+'</h3>'+
    '<div class="sc-meta">'+esc((w.blocks||[]).map(b=>b.heading).filter(Boolean).join(' · '))+'</div>'+
    '<div class="sc-chips">'+workoutChips(w)+'</div></div>';
}
function daysLabel(w){
  const names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return (w.days||[]).slice().sort().map(i=>names[i]).join(' & ');
}
function renderHome(){
  const el=document.getElementById('s-home');
  const act=activeSession();
  const now=new Date();
  const dstr=now.toLocaleDateString(undefined,{weekday:'long'});
  const wc=DB.workouts.length;
  const todayDow=now.getDay();
  const anyScheduled=DB.workouts.some(w=>w.days&&w.days.length);
  const todays=DB.workouts.filter(w=>(w.days||[]).includes(todayDow));
  const sub=act?dstr+' · One session in progress.'
    :!wc?dstr+' · Nothing built yet.'
    :!anyScheduled?dstr+' · '+(wc===1?'One session planned.':wc+' sessions ready.')
    :todays.length===1?dstr+' · One session planned.'
    :todays.length>1?dstr+' · '+todays.length+' sessions planned.'
    :dstr+' · Rest day — '+wc+' workout'+(wc===1?'':'s')+' ready.';
  let cards='';
  if(act){
    const w=DB.workouts.find(x=>x.id===act.workoutId)||{name:act.name,blocks:act.blocks};
    cards+=sessionCardHtml(Object.assign({},w,{name:act.name||w.name}),'In progress · resume',"openSession('"+act.id+"')");
  }
  if(!wc){
    cards+='<div class="card sessioncard" onclick="newWorkout()"><div class="sc-kicker">Start</div><h3>No workouts yet</h3><div class="sc-meta">Build your first workout in the Builder, then run it from here.</div><div class="sc-chips"><span class="chip gold">+ New workout</span></div></div>';
  } else {
    const rest=DB.workouts.filter(w=>!(act&&act.workoutId===w.id));
    const ordered=[...rest.filter(w=>(w.days||[]).includes(todayDow)),...rest.filter(w=>!(w.days||[]).includes(todayDow))];
    let first=!act;
    ordered.forEach(w=>{
      const scheduledToday=(w.days||[]).includes(todayDow);
      let kicker;
      if(scheduledToday)kicker='Today · '+workoutKind(w);
      else if(w.days&&w.days.length)kicker=daysLabel(w)+' · '+workoutKind(w);
      else kicker=(!anyScheduled&&first?'Today · ':'')+workoutKind(w);
      first=false;
      cards+=sessionCardHtml(w,kicker,"startWorkout('"+w.id+"')");
    });
  }
  el.innerHTML=
    '<div class="kicker">Welcome back</div><h1>Train today</h1>'+
    '<p class="sub">'+esc(sub)+'</p>'+
    weekStripHtml()+
    cards+
    (wc?'<button class="addbtn" onclick="newWorkout()">+ New workout</button>':'')+
    whoopCardHtml()+
    (WHOOP_OPEN?readinessCardHtml():'');
}

/* ---------- READINESS: WHOOP recovery × target-vs-felt RPE ---------- */
function rpeGapInfo(){
  const done=DB.sessions
    .filter(s=>(s.status==='completed'||s.status==='incomplete')&&s.completedAt&&Date.now()-s.completedAt<7*864e5)
    .sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
  for(const s of done){
    const gaps=[];
    s.blocks.forEach(b=>b.exercises.forEach(e=>e.sets.forEach(st=>{
      const t=parseFloat(st.rpe),f=parseFloat(st.felt);
      if(st.done&&Number.isFinite(t)&&Number.isFinite(f))gaps.push(f-t);
    })));
    if(gaps.length)return{gap:gaps.reduce((a,b)=>a+b,0)/gaps.length,date:s.date,n:gaps.length};
  }
  return null;
}
function readinessCardHtml(){
  const recRaw=WHOOP.sample?Number(WHOOP.sample.recoveryScore):NaN;
  const rec=Number.isFinite(recRaw)?Math.round(recRaw):null;
  const g=rpeGapInfo();
  if(rec==null&&!g)return '';
  const parts=[];
  if(rec!=null)parts.push('Recovery '+rec+'%');
  if(g){
    const s=g.gap>=0.25?'ran RPE +'+g.gap.toFixed(1)+' over target':g.gap<=-0.25?'ran RPE '+Math.abs(g.gap).toFixed(1)+' under target':'hit its RPE targets';
    parts.push('last session '+s);
  }
  let advice;
  if((g&&g.gap>=1)||(rec!=null&&rec<34))advice='Pull back today — cap the top sets about one RPE lower.';
  else if((rec==null||rec>=67)&&(!g||g.gap<=0.25))advice='Green light — train as planned, with room to push the top sets.';
  else advice='Train as planned today.';
  return '<div class="card guidebar" id="readinessCard"><b>Readiness:</b> '+esc(parts.join(' · '))+'. '+esc(advice)+'</div>';
}

/* ---------- WHOOP (server-side via Netlify functions) ---------- */
const WHOOP_ENDPOINTS={status:'/.netlify/functions/integrations-status',connect:'/.netlify/functions/whoop-connect',sync:'/.netlify/functions/whoop-sync',disconnect:'/.netlify/functions/integrations-disconnect'};
let WHOOP={loaded:false,connected:false,sample:null,lastSyncAt:null,busy:false,error:''};
function whoopTone(v){const n=Number(v);if(!Number.isFinite(n))return{cls:'',label:'No score yet',pct:0,val:null,color:null};const r=Math.max(0,Math.min(100,Math.round(n)));if(r>=67)return{cls:'good',label:'Strong',pct:r,val:r,color:'#16ec06'};if(r>=34)return{cls:'watch',label:'Steady',pct:r,val:r,color:'#ffde00'};return{cls:'low',label:'Low',pct:r,val:r,color:'#ff0026'};}
async function loadWhoop(){
  try{
    const r=await fetch(WHOOP_ENDPOINTS.status,{credentials:'same-origin',cache:'no-store'});
    if(!r.ok)throw new Error('Request failed ('+r.status+')');
    const d=await r.json();
    WHOOP.connected=!!(d.whoop&&d.whoop.connected);
    WHOOP.sample=d.whoop&&d.whoop.normalized?d.whoop.normalized:null;
    WHOOP.lastSyncAt=d.whoop?d.whoop.lastSyncAt:null;
    WHOOP.error='';
  }catch(e){WHOOP.connected=false;WHOOP.sample=null;WHOOP.error=String(e&&e.message||e);}
  WHOOP.loaded=true;
  if(CURRENT==='home')updateWhoopCard();
  if(CURRENT==='settings')renderSettings();
  // keep today's card fresh without user work
  if(WHOOP.connected&&!WHOOP.busy){
    const today=ymd(new Date());
    if(!WHOOP.sample||String(WHOOP.sample.date||'').slice(0,10)!==today)syncWhoop(true);
  }
}
async function syncWhoop(silent){
  if(WHOOP.busy)return;WHOOP.busy=true;if(!silent){updateWhoopCard();if(CURRENT==='settings')renderSettings();}
  try{
    const r=await fetch(WHOOP_ENDPOINTS.sync,{credentials:'same-origin',cache:'no-store'});
    if(!r.ok)throw new Error('Sync failed ('+r.status+')');
    const d=await r.json();
    if(d.connected===false)throw new Error('WHOOP is not connected.');
    if(d.normalized)WHOOP.sample=d.normalized;
    WHOOP.lastSyncAt=new Date().toISOString();
    WHOOP.error='';
  }catch(e){if(!silent)WHOOP.error=String(e&&e.message||e);}
  WHOOP.busy=false;
  if(CURRENT==='home')updateWhoopCard();
  if(CURRENT==='settings')renderSettings();
}
async function disconnectWhoop(){
  if(!confirm('Disconnect WHOOP from this app?'))return;
  WHOOP.busy=true;if(CURRENT==='settings')renderSettings();
  try{await fetch(WHOOP_ENDPOINTS.disconnect+'?provider=whoop',{method:'POST',credentials:'same-origin',cache:'no-store'});}catch(e){}
  WHOOP.busy=false;WHOOP.sample=null;WHOOP.connected=false;
  await loadWhoop();
  if(CURRENT==='settings')renderSettings();
}
function updateWhoopCard(){if(CURRENT==='home')renderHome();}
/* Details stay hidden behind the card until tapped — the rings carry the
   picture; numbers and readiness only appear on request. */
let WHOOP_OPEN=false;
function toggleWhoopDetails(){WHOOP_OPEN=!WHOOP_OPEN;if(CURRENT==='home')renderHome();}
const RING_TRACK='rgba(255,255,255,.09)',RING_IDLE='rgba(255,255,255,.14) 100%',STRAIN_BLUE='#0093e7';
function whoopRings(recColor,recPct,strainPct,center){
  const outer=strainPct==null?RING_IDLE:STRAIN_BLUE+' '+strainPct+'%';
  const inner=recPct==null?RING_IDLE:recColor+' '+recPct+'%';
  return '<div class="ringx" style="background:conic-gradient('+outer+','+RING_TRACK+' 0)">'+
    '<div class="ringx-in" style="background:conic-gradient('+inner+','+RING_TRACK+' 0)"><b>'+center+'</b></div></div>';
}
function whoopSettingsChip(){return '<button class="chip" style="cursor:pointer;font:inherit;font-size:10px;letter-spacing:.06em;text-transform:uppercase" onclick="event.stopPropagation();go(\'settings\')">WHOOP</button>';}
function whoopCardHtml(){
  let rings,title,line,chip;
  if(!WHOOP.loaded){
    rings=whoopRings(null,null,null,'…');
    title='WHOOP · today';line='Loading recovery…';
    chip='<span class="chip">WHOOP</span>';
  } else if(!WHOOP.connected){
    rings=whoopRings(null,null,null,'—');
    title='Connect WHOOP';line='Bring recovery, sleep and strain into today’s view.';
    chip='<a class="chip gold" style="text-decoration:none" onclick="event.stopPropagation()" href="'+WHOOP_ENDPOINTS.connect+'">Connect</a>';
  } else if(!WHOOP.sample){
    rings=whoopRings(null,null,null,'—');
    title='WHOOP connected';line='Sync to pull today’s recovery.';
    chip='<button class="chip gold" style="cursor:pointer;font:inherit;font-size:10px;letter-spacing:.06em;text-transform:uppercase" onclick="event.stopPropagation();syncWhoop()">'+(WHOOP.busy?'Syncing…':'Sync')+'</button>';
  } else {
    const t=whoopTone(WHOOP.sample.recoveryScore);
    const strainRaw=Number(WHOOP.sample.strain);
    const strainPct=Number.isFinite(strainRaw)?Math.max(0,Math.min(100,Math.round(strainRaw/21*100))):null;
    chip=whoopSettingsChip();
    if(!WHOOP_OPEN){
      rings=whoopRings(t.color,t.val==null?null:t.pct,strainPct,'');
      title='WHOOP · today';
      line='Tap to show recovery, strain & readiness.';
    } else {
      rings=whoopRings(t.color,t.val==null?null:t.pct,strainPct,(t.val==null?'—':t.val+'%'));
      title='Recovery '+(t.val==null?'—':t.val+'%')+' · '+t.label+(strainPct!=null?' · Strain '+strainRaw.toFixed(1):'');
      line='HRV '+(WHOOP.sample.hrvMs==null?'—':WHOOP.sample.hrvMs+' ms')+' · RHR '+(WHOOP.sample.restingHr==null?'—':WHOOP.sample.restingHr)+' · Sleep '+(WHOOP.sample.sleepPerformance==null?'—':WHOOP.sample.sleepPerformance+'%');
    }
  }
  return '<div class="card whoopmini" id="whoopCard" style="cursor:pointer" onclick="toggleWhoopDetails()" title="Show or hide WHOOP details">'+
    '<div style="display:flex;align-items:center;gap:14px">'+rings+'<div><b>'+esc(title)+'</b><p>'+esc(line)+'</p></div></div>'+chip+'</div>';
}

/* ---------- TRAINING (the mock's session day view) ---------- */
function renderTraining(){
  ensureSession();
  renderSession();
}

/* ---------- workout CRUD ---------- */
function newWorkout(){WK=templateWorkout();BUILDER_WID=WK.id;EDIT_EXISTING=false;openBlock=-1;go('builder');}
function editWorkout(id){const w=DB.workouts.find(x=>x.id===id);if(!w)return;WK=JSON.parse(JSON.stringify(w));BUILDER_WID=id;EDIT_EXISTING=true;openBlock=-1;go('builder');}
function hasLoggedWork(s){return s&&s.blocks.some(b=>b.exercises.some(e=>e.sets.some(st=>st.done||st.aVal||st.aVal2||st.felt)));}
function previewWorkout(){
  if(!WK.name.trim())WK.name='Untitled workout';
  const i=DB.workouts.findIndex(x=>x.id===WK.id);
  const clean=JSON.parse(JSON.stringify(WK));
  if(i>=0)DB.workouts[i]=clean;else DB.workouts.push(clean);
  EDIT_EXISTING=true;BUILDER_WID=WK.id;
  // refresh (or open) the live session for this workout — but never wipe logged sets
  let s=DB.sessions.find(x=>x.workoutId===WK.id&&x.status==='active');
  if(s&&!hasLoggedWork(s)){
    s.name=clean.name;
    s.blocks=JSON.parse(JSON.stringify(clean.blocks)).map(b=>{b.exercises.forEach(e=>e.sets.forEach(st=>{st.aVal='';st.aVal2='';st.felt='';st.done=false}));return b});
  }
  save();
  if(s)CUR_SESSION=s.id;else{CUR_SESSION=null;const w=DB.workouts.find(x=>x.id===WK.id);if(w){const ns={id:uid(),workoutId:w.id,name:w.name,date:ymd(new Date()),status:'active',startedAt:Date.now(),blocks:JSON.parse(JSON.stringify(w.blocks)).map(b=>{b.exercises.forEach(e=>e.sets.forEach(st=>{st.aVal='';st.aVal2='';st.felt='';st.done=false}));return b})};DB.sessions.push(ns);CUR_SESSION=ns.id;save();}}
  LOG_LOC=null;
  go('training');
}
function saveWorkout(){previewWorkout();}

/* ---------- start / open a live session ---------- */
function startWorkout(workoutId){
  const w=DB.workouts.find(x=>x.id===workoutId);if(!w)return;
  let s=DB.sessions.find(x=>x.workoutId===workoutId&&x.status==='active');
  if(!s){
    s={id:uid(),workoutId:workoutId,name:w.name,date:ymd(new Date()),status:'active',startedAt:Date.now(),
       blocks:JSON.parse(JSON.stringify(w.blocks)).map(b=>{b.exercises.forEach(e=>e.sets.forEach(st=>{st.aVal='';st.aVal2='';st.felt='';st.done=false}));return b})};
    DB.sessions.push(s);save();
  }
  openSession(s.id);
}
let CUR_SESSION=null;
function openSession(sessionId){CUR_SESSION=sessionId;go('training');}

/* ---------- SESSION (day view) ---------- */
function curSession(){return DB.sessions.find(s=>s.id===CUR_SESSION)||null}
function prettyDay(key){const p=String(key||'').split('-');if(p.length!==3)return key;const d=new Date(+p[0],+p[1]-1,+p[2]);return d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});}
function prettyMeta(m){return esc(m).replace(/(RPE [^·]+)/g,'<i>$1</i>').replace(/(@[^ ·]+)/g,'<i>$1</i>')}
function renderSession(){
  const el=document.getElementById('s-training');const s=curSession();
  if(!s){el.innerHTML='<div class="kicker">Training</div><h1 style="font-size:24px">No workout yet</h1><p class="sub">Build a workout first — then it runs here.</p><button class="addbtn" style="margin-top:16px" onclick="go(\'builder\')">Open the Builder</button>';return}
  const body=s.blocks.map((b,bi)=>{
    const head='<div class="sec-head"><h2>'+esc(b.heading||'Block')+'</h2>'+(b.minutes?'<span>'+esc(b.minutes)+' min</span>':'')+'</div>'+(b.format?'<div class="sec-format">'+esc(b.format)+'</div>':'');
    const rows=b.exercises.map((ex,ei)=>{
      const done=ex.sets.length&&ex.sets.every(st=>st.done);
      const open=(!b.superset&&ex.mode!=='completion');
      const endcap=open?'<div class="chev" aria-hidden="true">›</div>':'<div class="st">✓</div>';
      const onclick=open?'openLogger('+bi+','+ei+')':'toggleCompletion('+bi+','+ei+')';
      return '<div class="card exrow '+(open?'nav':'')+(done?' done':'')+'" onclick="'+onclick+'"><div class="t"><b>'+esc(ex.name||'Exercise')+'</b><span>'+prettyMeta(rxLine(ex))+'</span></div>'+endcap+'</div>';
    }).join('');
    if(b.superset){
      return '<div class="section">'+head+'<div class="superwrap"><div class="superlabel"><span>'+esc(b.format||'Superset')+'</span><button class="markall" onclick="markSuperset('+bi+')">Mark round complete</button></div>'+rows+'</div></div>';
    }
    return '<div class="section">'+head+rows+'</div>';
  }).join('');
  const allDone=s.blocks.every(b=>b.exercises.every(e=>e.sets.every(st=>st.done)));
  el.innerHTML=
    '<div class="backrow"><button class="backbtn" onclick="go(\'home\')">←</button><div><div class="kicker" style="margin-bottom:3px">'+esc(prettyDay(s.date))+' · in progress</div><h1 style="font-size:24px">'+esc(s.name||'Workout')+'</h1></div></div>'+
    '<div id="sessBody">'+body+'</div>'+
    '<div class="completebar"><button class="bigbtn'+(allDone?' donestate':'')+'" onclick="finishSession(this)">'+(allDone?'Everything logged — finish ✓':'Mark session complete')+'</button></div>';
}
function toggleCompletion(bi,ei){const s=curSession();if(!s)return;const ex=s.blocks[bi].exercises[ei];const d=!ex.sets.every(st=>st.done);ex.sets.forEach(st=>st.done=d);save();renderSession();}
function markSuperset(bi){const s=curSession();if(!s)return;s.blocks[bi].exercises.forEach(ex=>ex.sets.forEach(st=>st.done=true));save();renderSession();}
function finishSession(btn){
  const s=curSession();if(!s)return;
  s.status='completed';s.completedAt=Date.now();s.date=ymd(new Date());
  CUR_SESSION=null;LOG_LOC=null;
  save();
  btn.textContent='Completed ✓';btn.classList.add('donestate');
  confetti();
  setTimeout(()=>go('home'),1400);
}

/* ---------- LOGGER (the mock's set-by-set screen) ---------- */
let CUR_REST=0,LOG_LOC=null;
function loggerCols(mode){
  if(mode==='reps_kg')return['Set','KG','Reps','RPE felt',''];
  if(mode==='reps_seconds')return['Set','Secs','Reps','RPE felt',''];
  if(mode==='seconds')return['Set','Secs','RPE felt',''];
  if(mode==='reps')return['Set','Reps','RPE felt',''];
  return['Set','Done'];
}
function gridCols(mode){
  return mode==='reps_kg'||mode==='reps_seconds'?'34px 1fr 1fr 64px 40px'
    :mode==='completion'?'34px 1fr':'34px 1fr 64px 40px';
}
function lastTimeFor(name){
  const done=DB.sessions.filter(s=>s.status==='completed'||s.status==='incomplete').sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));
  for(const s of done){for(const b of s.blocks){for(const ex of b.exercises){
    if((ex.name||'').toLowerCase()===(name||'').toLowerCase()){
      const logged=ex.sets.filter(st=>st.done&&(st.aVal||st.aVal2));
      if(logged.length)return {date:s.date,sets:logged};
    }}}}
  return null;
}
function openLogger(bi,ei){
  const s=curSession();if(!s)return;
  LOG_LOC={bi,ei};go('logger');
}
function firstLoggable(s){
  for(let bi=0;bi<s.blocks.length;bi++){const b=s.blocks[bi];for(let ei=0;ei<b.exercises.length;ei++){if(!b.superset&&b.exercises[ei].mode!=='completion')return{bi,ei};}}
  if(s.blocks.length&&s.blocks[0].exercises.length)return{bi:0,ei:0};
  return null;
}
/* Training is the map; the Logger is the flow. The Logger tab always
   resumes at your next unfinished exercise and steps through the session. */
function loggableList(s){
  const out=[];
  s.blocks.forEach((b,bi)=>{if(b.superset)return;b.exercises.forEach((ex,ei)=>{if(ex.mode!=='completion')out.push({bi,ei})})});
  return out;
}
function exFinished(ex){return ex.sets.length>0&&ex.sets.every(st=>st.done)}
function nextUnfinished(s){
  return loggableList(s).find(({bi,ei})=>!exFinished(s.blocks[bi].exercises[ei]))||null;
}
function goLogger(btn){
  const s=curSession()||ensureSession();
  if(s){
    const cur=LOG_LOC&&s.blocks[LOG_LOC.bi]&&s.blocks[LOG_LOC.bi].exercises[LOG_LOC.ei];
    if(!cur||exFinished(cur))LOG_LOC=nextUnfinished(s)||firstLoggable(s);
  }
  go('logger',btn);
}
function stepLogger(d){
  const s=curSession();if(!s||!LOG_LOC)return;
  const list=loggableList(s);
  const idx=list.findIndex(l=>l.bi===LOG_LOC.bi&&l.ei===LOG_LOC.ei);
  const j=idx+d;
  if(j<0||j>=list.length)return;
  LOG_LOC=list[j];renderLoggerScreen();window.scrollTo({top:0});
}
function renderLoggerScreen(){
  const el=document.getElementById('s-logger');let s=curSession()||ensureSession();
  if(s&&(!LOG_LOC||!s.blocks[LOG_LOC.bi]||!s.blocks[LOG_LOC.bi].exercises[LOG_LOC.ei]))LOG_LOC=firstLoggable(s);
  if(!s||!LOG_LOC){el.innerHTML='<div class="kicker">Logger</div><h1 style="font-size:24px">Nothing to log yet</h1><p class="sub">Build a workout first — then log your sets here.</p><button class="addbtn" style="margin-top:16px" onclick="go(\'builder\')">Open the Builder</button>';return}
  const b=s.blocks[LOG_LOC.bi],ex=b.exercises[LOG_LOC.ei];CUR_REST=+ex.rest||0;
  const cols=loggerCols(ex.mode),grid=gridCols(ex.mode);
  const last=lastTimeFor(ex.name);
  const head='<div class="sethead" style="grid-template-columns:'+grid+'">'+cols.map(c=>'<span>'+c+'</span>').join('')+'</div>';
  const rows=ex.sets.map((st,si)=>{
    const numCell='<div class="n"><b>'+(si+1)+'</b></div>';
    const kgPh=last&&last.sets[si]&&last.sets[si].aVal?esc(last.sets[si].aVal)+' last':'kg';
    let mid='';
    if(ex.mode==='reps_kg')mid='<input inputmode="decimal" placeholder="'+kgPh+'" value="'+esc(st.aVal)+'" oninput="setActual('+si+',1,this.value)"><input inputmode="numeric" placeholder="reps" value="'+esc(st.aVal2)+'" oninput="setActual('+si+',2,this.value)">';
    else if(ex.mode==='reps_seconds')mid='<input inputmode="numeric" placeholder="secs" value="'+esc(st.aVal)+'" oninput="setActual('+si+',1,this.value)"><input inputmode="numeric" placeholder="reps" value="'+esc(st.aVal2)+'" oninput="setActual('+si+',2,this.value)">';
    else if(ex.mode==='seconds')mid='<input inputmode="numeric" placeholder="secs" value="'+esc(st.aVal)+'" oninput="setActual('+si+',1,this.value)">';
    else if(ex.mode==='reps')mid='<input inputmode="numeric" placeholder="reps" value="'+esc(st.aVal)+'" oninput="setActual('+si+',1,this.value)">';
    const rpeIn=ex.mode==='completion'?'':'<input class="rpein" inputmode="decimal" placeholder="felt" value="'+esc(st.felt)+'" oninput="setActual('+si+',3,this.value)">';
    const tickBtn='<button class="tick" onclick="tickSet('+si+')">✓</button>';
    const bits=[];
    if(ex.mode!=='completion'){if(st.t)bits.push((ex.mode==='seconds'||ex.mode==='reps_seconds')?st.t+'s':st.t+' reps');if(st.rpe)bits.push('RPE '+esc(st.rpe));}
    const tline='<div class="settarget">Set '+(si+1)+(bits.length?' · target '+bits.join(' · '):(ex.mode==='completion'?' · mark complete':''))+'</div>';
    return tline+'<div class="setrow'+(st.done?' done':'')+'" style="grid-template-columns:'+grid+'">'+numCell+mid+rpeIn+tickBtn+'</div>';
  }).join('');
  const restNote=CUR_REST?'Rest <i>'+fmtRest(CUR_REST)+' auto-starts on ✓</i>':'No prescribed rest';
  const lastBox=last?'<div class="card lastbox"><b>Last time</b> ('+esc(prettyDay(last.date))+'): '+last.sets.map(st=>esc((st.aVal||'')+(st.aVal2?'×'+st.aVal2:'')+(st.felt?' @RPE '+st.felt:''))).join(' · ')+'</div>':'';
  const list=loggableList(s),idx=list.findIndex(l=>l.bi===LOG_LOC.bi&&l.ei===LOG_LOC.ei),total=list.length;
  const kicker=esc(b.heading)+(idx>=0?' · exercise '+(idx+1)+' of '+total:' · set targets');
  const doneHere=exFinished(ex);
  let flow='';
  if(doneHere&&idx>=0&&idx<total-1){
    const nx=s.blocks[list[idx+1].bi].exercises[list[idx+1].ei];
    flow+='<button class="addbtn" onclick="stepLogger(1)">Next exercise: '+esc(nx.name||'Exercise')+' →</button>';
  }
  const sessionDone=s.blocks.every(bb=>bb.exercises.every(e=>e.sets.every(st=>st.done)));
  if(sessionDone)flow+='<div class="completebar" style="margin-top:16px"><button class="bigbtn" onclick="finishSession(this)">Everything logged — mark session complete</button></div>';
  const stepNav=(idx>=0&&total>1)?'<div class="histnav">'+
    (idx>0?'<button class="markall" onclick="stepLogger(-1)">‹ Previous</button>':'<span></span>')+
    (idx<total-1?'<button class="markall" onclick="stepLogger(1)">Next ›</button>':'<span></span>')+'</div>':'';
  el.innerHTML=
    '<div class="backrow"><button class="backbtn" onclick="go(\'training\')">←</button><div><div class="kicker" style="margin-bottom:3px">'+kicker+'</div><h1 style="font-size:24px">'+esc(ex.name||'Exercise')+'</h1><div class="logmeta">'+(ex.tempo?'Tempo <i>@'+esc(ex.tempo)+'</i> · ':'')+restNote+'</div></div></div>'+
    '<div class="card setcard">'+head+(rows||'<div class="lastbox" style="margin-top:0">No sets.</div>')+'</div>'+
    flow+stepNav+lastBox+
    '<div class="card guidebar"><b>Why "RPE felt" matters:</b> target vs. actual RPE per set is data most apps throw away. Paired with the WHOOP recovery you sync, it powers a readiness picture no off-the-shelf app has.</div>';
}
function setActual(si,slot,val){const s=curSession();if(!s||!LOG_LOC)return;const st=s.blocks[LOG_LOC.bi].exercises[LOG_LOC.ei].sets[si];if(slot===1)st.aVal=val;else if(slot===2)st.aVal2=val;else if(slot===3)st.felt=val;save();}
function tickSet(si){const s=curSession();if(!s||!LOG_LOC)return;const st=s.blocks[LOG_LOC.bi].exercises[LOG_LOC.ei].sets[si];st.done=!st.done;save();renderLoggerScreen();if(st.done&&CUR_REST>0)startRest(CUR_REST);}

/* ---------- rest timer: auto-starts on ✓, survives reload, vibrates at zero ---------- */
const REST_KEY=LS_KEY+'-rest-ends';
let restIv=null,restEnds=0;
function startRest(sec){
  stopRest(false);
  restEnds=Date.now()+sec*1000;
  try{localStorage.setItem(REST_KEY,String(restEnds))}catch(e){}
  showRestChip();
}
function showRestChip(){
  const chip=document.getElementById('restchip');
  chip.classList.add('show');paintRest();
  restIv=setInterval(tickRestTimer,500);
}
function tickRestTimer(){
  const left=Math.ceil((restEnds-Date.now())/1000);
  if(left<=0){
    if(navigator.vibrate){try{navigator.vibrate([200,120,200])}catch(e){}}
    stopRest();return;
  }
  paintRest();
}
function paintRest(){
  const left=Math.max(0,Math.ceil((restEnds-Date.now())/1000));
  const m=Math.floor(left/60),s=String(left%60).padStart(2,'0');
  document.getElementById('restclock').textContent=m+':'+s;
}
function stopRest(clear){
  clearInterval(restIv);restIv=null;restEnds=0;
  if(clear!==false){try{localStorage.removeItem(REST_KEY)}catch(e){}}
  const c=document.getElementById('restchip');if(c)c.classList.remove('show');
}
function resumeRest(){
  const ends=Number(localStorage.getItem(REST_KEY))||0;
  if(ends>Date.now()){restEnds=ends;showRestChip();}
  else if(ends){try{localStorage.removeItem(REST_KEY)}catch(e){}}
}

/* ---------- BUILDER ---------- */
let WK={id:uid(),name:'',blocks:[newBlock()]},EDIT_EXISTING=false,openBlock=0;
function refreshExNames(){const names=[...new Set(DB.workouts.flatMap(w=>w.blocks.flatMap(b=>b.exercises.map(e=>e.name).filter(Boolean))))];document.getElementById('exNames').innerHTML=names.map(n=>'<option value="'+esc(n)+'">').join('');}
let BUILDER_WID=null;
function renderBuilder(){
  refreshExNames();
  const cw=currentWorkout();
  if(!BUILDER_WID){
    if(cw){WK=JSON.parse(JSON.stringify(cw));BUILDER_WID=cw.id;EDIT_EXISTING=true;openBlock=-1;}
    else{BUILDER_WID=WK.id;}
  }
  const el=document.getElementById('s-builder');
  el.innerHTML=
    '<div class="kicker">Builder</div>'+
    '<h1 style="font-size:24px">Build your workout</h1>'+
    '<p class="sub">Add blocks, add exercises, set modes, sets, reps &amp; RPE. Then hit “See how it looks”.</p>'+
    '<div class="field" style="margin-top:18px"><label>Workout name</label><input id="wkName" value="'+esc(WK.name)+'" placeholder="e.g. Upper Pump — Day 1" oninput="WK.name=this.value"></div>'+
    '<div class="field"><label>Train on</label><div class="daychips">'+[0,1,2,3,4,5,6].map(i=>'<button class="daychip'+((WK.days||[]).includes(i)?' on':'')+'" onclick="toggleDay('+i+')">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i]+'</button>').join('')+'</div></div>'+
    '<div id="builderBody"></div>'+
    '<button class="addbtn" onclick="addBlock()">+ Add block</button>'+
    '<div class="completebar"><button class="bigbtn" onclick="previewWorkout()">See how it looks →</button></div>'+
    (EDIT_EXISTING&&DB.workouts.length?'<button class="markall" style="display:block;margin:16px auto 0;color:var(--bad)" onclick="deleteCurrentWorkout()">Delete this workout</button>':'');
  renderBuilderBody();
}
function deleteCurrentWorkout(){
  const id=BUILDER_WID,w=DB.workouts.find(x=>x.id===id);
  if(!w)return;
  if(!confirm('Delete "'+(w.name||'this workout')+'"? This cannot be undone.'))return;
  DB.workouts=DB.workouts.filter(x=>x.id!==id);
  DB.sessions=DB.sessions.filter(s=>!(s.workoutId===id&&s.status==='active'));
  if(CUR_SESSION&&!DB.sessions.find(s=>s.id===CUR_SESSION))CUR_SESSION=null;
  BUILDER_WID=null;EDIT_EXISTING=false;WK=templateWorkout();LOG_LOC=null;
  save();go('home');
}
function renderBuilderBody(){
  const box=document.getElementById('builderBody');if(!box)return;
  box.innerHTML=WK.blocks.map((b,bi)=>{
    const open=bi===openBlock;
    return '<div class="bblock '+(open?'open':'')+'"><div class="bblock-head"><button class="bexp" onclick="toggleBlock('+bi+')" aria-label="expand block">'+(open?'▾':'▸')+'</button><input class="bhead" value="'+esc(b.heading)+'" placeholder="Block name" oninput="editBlock('+bi+',\'heading\',this.value)"><div class="bctrls"><button onclick="moveBlock('+bi+',-1)" aria-label="move up">↑</button><button onclick="moveBlock('+bi+',1)" aria-label="move down">↓</button><button class="del" onclick="delBlock('+bi+')" aria-label="delete block">✕</button></div></div>'+
      (open?
        '<div class="brow2"><input class="bmin" value="'+esc(b.minutes)+'" placeholder="min" inputmode="numeric" oninput="editBlock('+bi+',\'minutes\',this.value)"><input class="bfmt" value="'+esc(b.format)+'" placeholder="format — e.g. Every 2:30 × 4 sets" oninput="editBlock('+bi+',\'format\',this.value)"><label class="bss"><input type="checkbox" '+(b.superset?'checked':'')+' onchange="toggleSS('+bi+',this.checked)"> Superset</label></div>'+
        b.exercises.map((ex,ei)=>exCard(b,ex,bi,ei)).join('')+
        '<button class="addbtn small" onclick="addEx('+bi+')">+ Add exercise</button>'
       :'<div class="bsummary" onclick="toggleBlock('+bi+')">'+blockSummary(b)+'</div>')+
    '</div>';
  }).join('');
}
function blockSummary(b){const n=b.exercises.length;return n+' exercise'+(n===1?'':'s')+(b.minutes?' · '+esc(b.minutes)+' min':'')+(b.format?' · '+esc(b.format):'')}
/* Calmer cards: identical set targets collapse to one row; tempo/rest sit
   behind a disclosure until an exercise actually uses them. */
const VARY=new Set(),OPTS=new Set();
function exKey(ex,bi,ei){return ex.id||bi+'-'+ei}
function setsUniform(ex){return ex.sets.length>1&&ex.sets.every(s=>s.t===ex.sets[0].t&&s.rpe===ex.sets[0].rpe)}
function exCard(b,ex,bi,ei){
  const cfg=MODES[ex.mode]||MODES.reps_kg;
  const key=exKey(ex,bi,ei);
  const uniform=setsUniform(ex);
  let setRows;
  if(ex.mode==='completion'){
    setRows='<div class="bsetrow nomode"><span>'+ex.sets.length+' set'+(ex.sets.length===1?'':'s')+'</span><span class="cmeta">marked complete — no targets</span></div>';
  } else if(uniform&&!VARY.has(key)){
    setRows='<div class="bsetrow"><span>All sets</span><input inputmode="numeric" value="'+esc(ex.sets[0].t)+'" placeholder="'+cfg.ph+'" oninput="editAllSets('+bi+','+ei+',\'t\',this.value)"><input class="rpe" inputmode="decimal" value="'+esc(ex.sets[0].rpe)+'" placeholder="RPE –" oninput="editAllSets('+bi+','+ei+',\'rpe\',this.value)"></div>'+
      '<button class="markall" style="margin-top:9px" onclick="varySets('+bi+','+ei+')">vary per set →</button>';
  } else {
    setRows=ex.sets.map((s,si)=>'<div class="bsetrow"><span>Set '+(si+1)+'</span><input inputmode="numeric" value="'+esc(s.t)+'" placeholder="'+cfg.ph+'" oninput="editSet('+bi+','+ei+','+si+',\'t\',this.value)"><input class="rpe" inputmode="decimal" value="'+esc(s.rpe)+'" placeholder="RPE –" oninput="editSet('+bi+','+ei+','+si+',\'rpe\',this.value)"></div>').join('')+
      (uniform?'<button class="markall" style="margin-top:9px" onclick="unvarySets('+bi+','+ei+')">← same for all sets</button>':'');
  }
  const showOpts=Boolean(ex.tempo)||Boolean(+ex.rest)||OPTS.has(key);
  const modeRow=showOpts
    ? '<div class="bex-grid"><select onchange="setMode('+bi+','+ei+',this.value)">'+MODEKEYS.map(m=>'<option value="'+m+'" '+(m===ex.mode?'selected':'')+'>'+MODES[m].label+'</option>').join('')+'</select><input value="'+esc(ex.tempo)+'" placeholder="tempo" oninput="editEx('+bi+','+ei+',\'tempo\',this.value)"><input value="'+esc(ex.rest||'')+'" placeholder="rest s" inputmode="numeric" oninput="editEx('+bi+','+ei+',\'rest\',this.value)"></div>'
    : '<div class="bex-grid solo"><select onchange="setMode('+bi+','+ei+',this.value)">'+MODEKEYS.map(m=>'<option value="'+m+'" '+(m===ex.mode?'selected':'')+'>'+MODES[m].label+'</option>').join('')+'</select></div>'+
      '<button class="markall" style="margin-top:9px" onclick="showExOpts('+bi+','+ei+')">+ tempo · rest</button>';
  return '<div class="bex"><div class="bex-head"><input class="bexname" list="exNames" value="'+esc(ex.name)+'" placeholder="Exercise name" oninput="editEx('+bi+','+ei+',\'name\',this.value)"><button class="del" onclick="delEx('+bi+','+ei+')" aria-label="remove">✕</button></div>'+
    modeRow+
    (ex.mode==='completion'?'':'<div class="bsteprow"><button class="stepbtn sm" onclick="bumpSets('+bi+','+ei+',-1)">−</button><span>'+ex.sets.length+' set'+(ex.sets.length===1?'':'s')+'</span><button class="stepbtn sm" onclick="bumpSets('+bi+','+ei+',1)">+</button></div>')+
    setRows+
    '<div class="rxline" id="rxb'+bi+'e'+ei+'">'+rxLine(ex)+'</div></div>';
}
function editAllSets(bi,ei,k,v){WK.blocks[bi].exercises[ei].sets.forEach(s=>s[k]=v.trim());refreshRx(bi,ei);}
function varySets(bi,ei){VARY.add(exKey(WK.blocks[bi].exercises[ei],bi,ei));renderBuilderBody();}
function unvarySets(bi,ei){VARY.delete(exKey(WK.blocks[bi].exercises[ei],bi,ei));renderBuilderBody();}

function toggleDay(i){WK.days=WK.days||[];const ix=WK.days.indexOf(i);if(ix>=0)WK.days.splice(ix,1);else WK.days.push(i);renderBuilder();}

const CHANGE_KEY=LS_KEY+'-changedAt';
let cloudUser=null,cloudBusy=false,cloudError='',cloudTimer=null,cloudPending=false,lastSyncedFp=null;
function cloudEnabled(){return !!SB}
function localChangeAt(){return Number(localStorage.getItem(CHANGE_KEY))||0}
function markLocalChange(at){try{localStorage.setItem(CHANGE_KEY,String(at||Date.now()))}catch(e){}}
function cloudFp(engine){try{return JSON.stringify({w:engine.workouts||[],s:engine.sessions||[]})}catch(e){return 'fp-'+Math.random()}}
async function cloudInit(){
  if(!cloudEnabled())return;
  try{const {data}=await SB.auth.getSession();cloudUser=data&&data.session?data.session.user:null;if(cloudUser)await cloudReconcile();}
  catch(e){cloudError=String(e&&e.message||e);}
  SB.auth.onAuthStateChange((event,session)=>{
    const prev=cloudUser;cloudUser=session?session.user:null;
    if(event==='SIGNED_IN'&&cloudUser&&(!prev||prev.id!==cloudUser.id))cloudReconcile();
    if(event==='PASSWORD_RECOVERY'){
      const np=prompt('Enter a new password for your account:');
      if(np)SB.auth.updateUser({password:np}).then(({error})=>alert(error?('Password update failed: '+error.message):'Password updated. You are signed in.'));
    }
    if(CURRENT==='settings')renderSettings();
  });
}
async function cloudReconcile(){
  if(!cloudEnabled()||!cloudUser)return;
  cloudBusy=true;cloudError='';if(CURRENT==='settings')renderSettings();
  try{
    const {data,error}=await SB.from('app_state').select('state,updated_at').eq('user_id',cloudUser.id).maybeSingle();
    if(error)throw error;
    const remote=data&&data.state&&data.state.hybridEngine?data.state.hybridEngine:null;
    if(!remote){await cloudPushNow(true);}
    else{
      const localEmpty=(DB.workouts.length===0&&DB.sessions.length===0);
      if(cloudFp(remote)===cloudFp(DB)){lastSyncedFp=cloudFp(DB);}
      else{
        const remoteAt=data.updated_at?Date.parse(data.updated_at):0,localAt=localChangeAt();
        if(localEmpty||remoteAt>=localAt){
          DB={workouts:remote.workouts||[],sessions:remote.sessions||[],settings:Object.assign({},DB.settings,remote.settings||{})};
          try{localStorage.setItem(LS_KEY,JSON.stringify(DB))}catch(e){}
          markLocalChange(remoteAt||Date.now());lastSyncedFp=cloudFp(DB);
          renderScreen(CURRENT);
        }else{await cloudPushNow(true);}
      }
    }
  }catch(e){cloudError=String(e&&e.message||e);}
  cloudBusy=false;if(CURRENT==='settings')renderSettings();
}
function queueCloudPush(){
  markLocalChange(Date.now());
  if(!cloudEnabled()||!cloudUser)return;
  if(cloudTimer)clearTimeout(cloudTimer);
  cloudTimer=setTimeout(()=>cloudPushNow(false),900);
}
async function cloudPushNow(force){
  if(!cloudEnabled()||!cloudUser)return;
  if(cloudBusy&&!force){cloudPending=true;return;}
  const fp=cloudFp(DB);
  if(!force&&fp===lastSyncedFp)return;
  cloudBusy=true;
  try{
    // merge-preserve: keep any other keys already in this user's state row
    let existing={};
    try{const {data}=await SB.from('app_state').select('state').eq('user_id',cloudUser.id).maybeSingle();if(data&&data.state&&typeof data.state==='object')existing=data.state;}catch(e){}
    const state=Object.assign({},existing,{hybridEngine:{workouts:DB.workouts,sessions:DB.sessions,settings:DB.settings}});
    const {error}=await SB.from('app_state').upsert({user_id:cloudUser.id,state},{onConflict:'user_id'});
    if(error)throw error;
    lastSyncedFp=fp;cloudError='';
  }catch(e){cloudError=String(e&&e.message||e);}
  cloudBusy=false;if(CURRENT==='settings')renderSettings();
  if(cloudPending){cloudPending=false;queueCloudPush();}
}
async function cloudSignIn(mode){
  if(!cloudEnabled())return alert('Cloud sync is not configured.');
  const email=(document.getElementById('cloudEmail')||{}).value||'',password=(document.getElementById('cloudPassword')||{}).value||'';
  if(!email.trim()||!password)return alert('Enter an email and password.');
  cloudError='';
  try{
    if(mode==='signup'){const {data,error}=await SB.auth.signUp({email:email.trim(),password});if(error)throw error;if(!data||!data.session)alert('Account created. Check your email to confirm, then sign in.');}
    else{const {error}=await SB.auth.signInWithPassword({email:email.trim(),password});if(error)throw error;}
  }catch(e){cloudError=String(e&&e.message||e);alert((mode==='signup'?'Sign up':'Sign in')+' failed: '+cloudError);}
  renderSettings();
}
async function cloudSignOut(){if(!cloudEnabled())return;try{await SB.auth.signOut()}catch(e){}cloudUser=null;renderSettings();}
async function cloudResetPassword(){
  if(!cloudEnabled())return alert('Cloud sync is not configured.');
  const email=((document.getElementById('cloudEmail')||{}).value||'').trim();
  if(!email)return alert('Enter your email above first, then tap "Forgot password?".');
  try{
    const {error}=await SB.auth.resetPasswordForEmail(email,{redirectTo:location.origin});
    if(error)throw error;
    alert('Password reset email sent to '+email+'. Open the link on this device to set a new password.');
  }catch(e){alert('Reset failed: '+(e&&e.message||e));}
}

/* ---------- local data export / import / reset ---------- */
function exportData(){const blob=new Blob([JSON.stringify({app:'THE Hybrid Engine',exportedAt:new Date().toISOString(),db:DB},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='hybrid-engine-backup.json';a.click();setTimeout(()=>URL.revokeObjectURL(url),0);}
function importData(ev){const f=ev.target.files&&ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const p=JSON.parse(rd.result);const d=p.db||p;if(!d||!Array.isArray(d.workouts))throw new Error('Not a valid backup.');DB={workouts:d.workouts||[],sessions:d.sessions||[],settings:d.settings||{}};save();renderSettings();alert('Backup imported.');}catch(e){alert('Import failed: '+(e&&e.message||e));}};rd.readAsText(f);}
function resetLocal(){if(!confirm('Wipe all workouts and history on THIS device? Cloud data (if signed in) is not touched unless you then sync.'))return;DB={workouts:[],sessions:[],settings:{}};try{localStorage.setItem(LS_KEY,JSON.stringify(DB))}catch(e){}renderSettings();}

]};}
function isUntouchedDemo(w){
  if(!w||w.name!=='Upper Pump — Day 1')return false;
  const demoNames=['Cardio of choice','Band pull-apart','Scap push-up','Incline Bench Press','Supinated Bent-Over Row','Farmer carry','Stretch flow'];
  const exNames=(w.blocks||[]).flatMap(b=>(b.exercises||[]).map(e=>e.name));
  return exNames.join('|')===demoNames.join('|');
}
function seedIfEmpty(){
  DB.settings=Object.assign({},DB.settings);
  if(DB.settings.seedV===2)return;
  if(!DB.workouts.length){
    DB.workouts=[templateWorkout()];
  }else{
    // swap the old named demo for the nameless template — but never touch a workout
    // the user completed a session with, renamed, or edited
    DB.workouts=DB.workouts.map(w=>{
      const completed=DB.sessions.some(s=>s.workoutId===w.id&&s.status==='completed');
      if(isUntouchedDemo(w)&&!completed){
        DB.sessions=DB.sessions.filter(s=>!(s.workoutId===w.id&&s.status!=='completed'));
        return templateWorkout(w.id);
      }
      return w;
    });
  }
  DB.settings.seedV=2;DB.settings.seeded=true;
  try{localStorage.setItem(LS_KEY,JSON.stringify(DB))}catch(e){}
}
function currentWorkout(){const act=DB.sessions.find(s=>s.status==='active');if(act){const w=DB.workouts.find(x=>x.id===act.workoutId);if(w)return w;}return DB.workouts[0]||null;}
function ensureSession(){let s=curSession();if(s&&s.status==='active')return s;const act=DB.sessions.find(x=>x.status==='active');if(act){CUR_SESSION=act.id;return act;}const w=currentWorkout();if(!w)return null;s={id:uid(),workoutId:w.id,name:w.name,date:ymd(new Date()),status:'active',startedAt:Date.now(),blocks:JSON.parse(JSON.stringify(w.blocks)).map(b=>{b.exercises.forEach(e=>e.sets.forEach(st=>{st.aVal='';st.aVal2='';st.felt='';st.done=false}));return b})};DB.sessions.push(s);CUR_SESSION=s.id;save();return s;}

/* ---------- stale sessions: yesterday's unfinished work becomes history ---------- */
function expireStaleSessions(){
  const today=ymd(new Date());let changed=false;
  DB.sessions=DB.sessions.filter(s=>{
    if(s.status!=='active'||s.date>=today)return true;
    changed=true;
    if(hasLoggedWork(s)){s.status='incomplete';s.completedAt=s.completedAt||s.startedAt||Date.now();return true;}
    return false;
  });
  if(changed){try{localStorage.setItem(LS_KEY,JSON.stringify(DB))}catch(e){}}
}
